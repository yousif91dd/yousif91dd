<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مكتبة يوسف المطور</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --main: #2c3e50; --green: #27ae60; --red: #e74c3c; --blue: #3498db; --bg: #f1f2f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 10px; direction: rtl; }
        .login-box, .container { max-width: 450px; margin: 50px auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 10px solid var(--main); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 5px; transition: 0.3s; }
        .btn-add { background: var(--green); color: white; font-size: 18px; }
        .btn-pay { background: var(--blue); color: white; width: 48%; }
        .btn-del { background: var(--red); color: white; width: 48%; }
        .debt-item { background: #fff; border: 1px solid #ddd; padding: 15px; margin-top: 15px; border-radius: 15px; text-align: right; }
        .total-box { background: var(--main); color: white; padding: 20px; border-radius: 15px; margin-top: 25px; font-size: 22px; font-weight: bold; }
        .actions { display: flex; justify-content: space-between; margin-top: 10px; }
        #app-content { display: none; }
    </style>
</head>
<body>

<div id="login-screen" class="login-box">
    <h2>🔐 دخول النظام</h2>
    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button class="btn-add" onclick="login()">دخول</button>
</div>

<div id="app-content" class="container">
    <h2>📚 مكتبة يوسف</h2>
    <input type="text" id="customerName" placeholder="اسم الزبون...">
    <input type="number" id="amount" placeholder="المبلغ (د.ع)...">
    <button class="btn-add" onclick="addDebt()">إضافة دين جديد +</button>
    
    <div id="list"></div>
    
    <div class="total-box">المجموع الكلي: <span id="total">0</span> د.ع</div>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAwa3TBmBMmuuIxD0R_EVQTLASWivqjIx8",
        authDomain: "maktb-yousif.firebaseapp.com",
        databaseURL: "https://maktb-yousif-default-rtdb.firebaseio.com",
        projectId: "maktb-yousif",
        storageBucket: "maktb-yousif.firebasestorage.app",
        messagingSenderId: "200688688416",
        appId: "1:200688688416:web:1354d536d74fd0accb0b45"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // نظام تسجيل الدخول
    function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === "yousif" && p === "1991") { // تكدر تغيرهم منا
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        } else {
            alert("المعلومات خطأ يا يوسف!");
        }
    }

    // إضافة دين
    function addDebt() {
        const name = document.getElementById('customerName').value;
        const price = document.getElementById('amount').value;
        if(name && price) {
            db.ref('debts').push({ name: name, amount: parseInt(price) });
            document.getElementById('customerName').value=''; 
            document.getElementById('amount').value='';
        }
    }

    // تسديد جزئي
    function payPart(id, currentAmount) {
        const pay = prompt("كم المبلغ الذي تم تسديده؟");
        if(pay && !isNaN(pay)) {
            const newAmount = currentAmount - parseInt(pay);
            if(newAmount <= 0) {
                db.ref('debts/' + id).remove();
            } else {
                db.ref('debts/' + id).update({ amount: newAmount });
            }
        }
    }

    // حذف نهائي
    function deleteDebt(id) {
        if(confirm("هل تريد حذف هذا الدين بالكامل؟")) {
            db.ref('debts/' + id).remove();
        }
    }

    // تحديث البيانات تلقائياً
    db.ref('debts').on('value', (s) => {
        let h = ''; let t = 0;
        s.forEach((child) => {
            const d = child.val(); 
            const id = child.key;
            t += d.amount;
            h += `<div class="debt-item">
                <b>👤 ${d.name}</b><br>
                <span style="color:red; font-size:20px;">💰 ${d.amount.toLocaleString()} د.ع</span>
                <div class="actions">
                    <button class="btn-pay" onclick="payPart('${id}', ${d.amount})">📉 تسديد</button>
                    <button class="btn-del" onclick="deleteDebt('${id}')">🗑️ حذف</button>
                </div>
            </div>`;
        });
        document.getElementById('list').innerHTML = h;
        document.getElementById('total').innerText = t.toLocaleString();
    });
</script>
</body>
</html>

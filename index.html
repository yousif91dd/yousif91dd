<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجلات مكتبة يوسف</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --main: #2c3e50; --green: #27ae60; --red: #e74c3c; --blue: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 550px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--main); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .btn-add { background: var(--green); color: white; }
        .customer-card { background: #fff; border: 1px solid #eee; padding: 15px; margin-top: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .invoice-row { background: #f9f9f9; padding: 8px; margin: 5px 0; border-radius: 5px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .total-badge { background: var(--main); color: white; padding: 5px 10px; border-radius: 5px; display: inline-block; margin-top: 10px; }
        .action-btns { display: flex; gap: 5px; margin-top: 10px; }
        .btn-small { padding: 8px; font-size: 12px; }
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; top: 0; width: 100%; } }
    </style>
</head>
<body>

<div class="container">
    <h2>📚 نظام سجلات مكتبة يوسف</h2>
    <p style="text-align:center; color:#666;">أدخل الاسم الثلاثي للزبون للبدء</p>
    
    <input type="text" id="fullName" placeholder="اسم الزبون الثلاثي...">
    <input type="text" id="itemType" placeholder="المادة (مثلاً: ملازم، دفتر)...">
    <div class="grid-inputs">
        <input type="number" id="itemQty" placeholder="العدد" oninput="calc()">
        <input type="number" id="itemPrice" placeholder="السعر" oninput="calc()">
    </div>
    <input type="number" id="finalPrice" placeholder="الإجمالي" readonly style="background:#eee;">
    
    <button class="btn-add" onclick="saveToRecord()">حفظ في سجل الزبون +</button>

    <div id="records-list"></div>
</div>

<div id="print-area" style="display:none;"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAwa3TBmBMmuuIxD0R_EVQTLASWivqjIx8",
        authDomain: "maktb-yousif.firebaseapp.com",
        databaseURL: "https://maktb-yousif-default-rtdb.firebaseio.com",
        projectId: "maktb-yousif",
        storageBucket: "maktb-yousif.firebasestorage.app",
        messagingSenderId: "200688688416",
        appId: "1:200688688416:web:1354d536d74fd0accb0b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function calc() {
        const q = document.getElementById('itemQty').value || 0;
        const p = document.getElementById('itemPrice').value || 0;
        document.getElementById('finalPrice').value = q * p;
    }

    // حفظ البيانات في سجل الزبون
    function saveToRecord() {
        const name = document.getElementById('fullName').value.trim();
        const type = document.getElementById('itemType').value;
        const total = parseInt(document.getElementById('finalPrice').value);

        if(name && total > 0) {
            // البحث عن الزبون بالاسم، إذا موجود يضيف له، إذا لا ينشئ جديد
            const sanitizedName = name.replace(/\s+/g, '_'); 
            const ref = db.ref('records/' + sanitizedName);
            
            ref.child('invoices').push({
                type: type,
                amount: total,
                date: new Date().toLocaleString('ar-IQ')
            });
            
            ref.child('name').set(name);
            
            // تصفير الخانات
            ["itemType","itemQty","itemPrice","finalPrice"].forEach(id => document.getElementById(id).value='');
        } else { alert("يرجى إكمال البيانات!"); }
    }

    // عرض السجلات
    db.ref('records').on('value', (snapshot) => {
        let html = '';
        snapshot.forEach((customer) => {
            const data = customer.val();
            const customerKey = customer.key;
            let customerTotal = 0;
            let invoicesHtml = '';

            if(data.invoices) {
                Object.keys(data.invoices).forEach(invId => {
                    const inv = data.invoices[invId];
                    customerTotal += inv.amount;
                    invoicesHtml += `
                        <div class="invoice-row">
                            <span>🔹 ${inv.type} (${inv.date})</span>
                            <b>${inv.amount.toLocaleString()} د.ع</b>
                            <button class="btn-small" style="background:var(--red); color:white; width:30px;" onclick="deleteInv('${customerKey}','${invId}')">X</button>
                        </div>`;
                });
            }

            html += `
                <div class="customer-card">
                    <h3 style="margin:0;">👤 ${data.name}</h3>
                    <div id="details-${customerKey}">${invoicesHtml}</div>
                    <div class="total-badge">المجموع المتبقي: ${customerTotal.toLocaleString()} د.ع</div>
                    <div class="action-btns">
                        <button class="btn-small" style="background:var(--blue); color:white;" onclick="payPopup('${customerKey}', ${customerTotal})">📉 تسديد مبلغ</button>
                        <button class="btn-small" style="background:#f39c12; color:white;" onclick="printRecord('${customerKey}')">🖨️ طباعة السجل</button>
                        <button class="btn-small" style="background:var(--red); color:white;" onclick="deleteCustomer('${customerKey}')">🗑️ حذف الملف</button>
                    </div>
                </div>`;
        });
        document.getElementById('records-list').innerHTML = html;
    });

    function payPopup(key, currentTotal) {
        const amount = prompt("أدخل المبلغ الذي سدده الزبون حالياً:");
        if(amount && !isNaN(amount)) {
            const val = parseInt(amount);
            db.ref('records/' + key + '/invoices').push({
                type: "تسديد واصل",
                amount: -val,
                date: new Date().toLocaleString('ar-IQ')
            });
        }
    }

    function deleteInv(cKey, invId) { if(confirm("حذف هذا الوصل؟")) db.ref(`records/${cKey}/invoices/${invId}`).remove(); }
    function deleteCustomer(key) { if(confirm("حذف سجل الزبون بالكامل؟")) db.ref('records/' + key).remove(); }

    function printRecord(key) {
        db.ref('records/' + key).once('value', (s) => {
            const d = s.val();
            let rows = ''; let total = 0;
            Object.values(d.invoices).forEach(i => {
                rows += `<p>${i.date} - ${i.type}: ${i.amount} د.ع</p>`;
                total += i.amount;
            });
            const area = document.getElementById('print-area');
            area.innerHTML = `<h2>سجل ديون: ${d.name}</h2><hr>${rows}<hr><h3>المجموع النهائي: ${total} د.ع</h3>`;
            window.print();
        });
    }
</script>
</body>
</html>

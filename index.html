<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجلات مكتبة يوسف - النسخة الاحترافية</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --main: #2c3e50; --green: #27ae60; --red: #e74c3c; --blue: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 550px; margin: 10px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--main); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; transition: 0.3s; }
        .btn-add-main { background: var(--green); color: white; font-size: 18px; margin-bottom: 20px; }
        .customer-card { background: #fff; border: 1px solid #eee; padding: 15px; margin-top: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-right: 6px solid var(--blue); }
        .invoice-item { background: #f9f9f9; padding: 10px; margin: 5px 0; border-radius: 8px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .total-box { background: var(--main); color: white; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; font-size: 18px; font-weight: bold; }
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-action { font-size: 13px; padding: 10px; color: white; }
        .btn-new-item { background: #8e44ad; } /* لون بنفسجي لتمييز الإضافة الجديدة */
        .btn-pay { background: var(--blue); }
        .btn-print { background: #f39c12; grid-column: span 2; }
        .btn-del-file { background: var(--red); grid-column: span 2; margin-top: 10px; opacity: 0.8; }
        .delete-small { background: none; color: var(--red); width: auto; padding: 0 5px; font-size: 20px; margin: 0; }
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; top: 0; width: 100%; } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">📚 سجلات مكتبة يوسف</h2>
    
    <div style="background: #fdfdfd; padding: 15px; border: 1px dashed #ccc; border-radius: 12px; margin-bottom: 20px;">
        <label><b>➕ فتح سجل لزبون جديد:</b></label>
        <input type="text" id="newCustomerName" placeholder="اكتب الاسم الثلاثي هنا...">
        <button class="btn-add-main" onclick="createNewRecord()">فتح سجل جديد</button>
    </div>

    <div id="records-list"></div>
</div>

<div id="print-area" style="display:none;"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAwa3TBmBMmuuIxD0R_EVQTLASWivqjIx8",
        authDomain: "maktb-yousif.firebaseapp.com",
        databaseURL: "https://maktb-yousif-default-rtdb.firebaseio.com",
        projectId: "maktb-yousif",
        storageBucket: "maktb-yousif.firebasestorage.app",
        messagingSenderId: "200688688416",
        appId: "1:200688688416:web:1354d536d74fd0accb0b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function createNewRecord() {
        const name = document.getElementById('newCustomerName').value.trim();
        if(name) {
            const key = btoa(unescape(encodeURIComponent(name))).replace(/=/g, ""); 
            db.ref('records/' + key).child('name').set(name);
            document.getElementById('newCustomerName').value = '';
            alert("تم فتح السجل بنجاح");
        }
    }

    function addItemToCustomer(cKey) {
        const type = prompt("أدخل نوع المادة (مثلاً: ملازم، دفتر):");
        if (!type) return;
        const amount = prompt("أدخل المبلغ (بالأرقام فقط):");
        if (amount && !isNaN(amount)) {
            db.ref('records/' + cKey + '/items').push({
                type: type,
                amount: parseInt(amount),
                date: new Date().toLocaleString('ar-IQ')
            });
        }
    }

    function payPopup(cKey) {
        const amount = prompt("كم المبلغ الذي سدده الزبون؟");
        if(amount && !isNaN(amount)) {
            db.ref('records/' + cKey + '/items').push({
                type: "تسديد نقد (واصل)",
                amount: -parseInt(amount),
                date: new Date().toLocaleString('ar-IQ')
            });
        }
    }

    db.ref('records').on('value', (snapshot) => {
        let html = '';
        snapshot.forEach((customer) => {
            const data = customer.val();
            const cKey = customer.key;
            let sum = 0;
            let itemsHtml = '';

            if(data.items) {
                Object.keys(data.items).forEach(itemId => {
                    const itm = data.items[itemId];
                    sum += itm.amount;
                    itemsHtml += `
                        <div class="invoice-item">
                            <span>🔹 ${itm.type} <br><small style="color:#888;">${itm.date}</small></span>
                            <b>${itm.amount.toLocaleString()} د.ع 
                            <button class="delete-small" onclick="deleteItem('${cKey}','${itemId}')">×</button></b>
                        </div>`;
                });
            }

            html += `
                <div class="customer-card">
                    <h3 style="margin:0; color:var(--main); display:flex; justify-content:space-between;">
                        <span>👤 ${data.name}</span>
                    </h3>
                    <div id="items-${cKey}">${itemsHtml}</div>
                    <div class="total-box">المجموع المتبقي: ${sum.toLocaleString()} د.ع</div>
                    
                    <div class="action-row">
                        <button class="btn-action btn-new-item" onclick="addItemToCustomer('${cKey}')">➕ إضافة مادة</button>
                        <button class="btn-action btn-pay" onclick="payPopup('${cKey}')">📉 تسديد مبلغ</button>
                        <button class="btn-action btn-print" onclick="printDoc('${cKey}')">🖨 طباعة كشف حساب</button>
                        <button class="btn-action btn-del-file" onclick="deleteCustomer('${cKey}')">🗑 حذف السجل بالكامل</button>
                    </div>
                </div>`;
        });
        document.getElementById('records-list').innerHTML = html;
    });

    function deleteItem(cKey, iId) { if(confirm("حذف هذا السطر؟")) db.ref(`records/${cKey}/items/${iId}`).remove(); }
    function deleteCustomer(cKey) { if(confirm("حذف ملف الزبون نهائياً؟")) db.ref('records/' + cKey).remove(); }

    function printDoc(cKey) {
        db.ref('records/' + cKey).once('value', (s) => {
            const d = s.val();
            let rows = ''; let total = 0;
            Object.values(d.items).forEach(i => {
                rows += `<div style="display:flex; justify-content:space-between; border-bottom:1px dashed #ccc; padding:8px;">
                            <span>${i.date} - ${i.type}</span>
                            <span>${i.amount.toLocaleString()} د.ع</span>
                         </div>`;
                total += i.amount;
            });
            const area = document.getElementById('print-area');
            area.innerHTML = `<div style="text-align:center; padding:20px; direction:rtl;">
                <h2>مكتبة يوسف</h2><p>كشف حساب ديون</p><hr>
                <h3 style="text-align:right;">الزبون: ${d.name}</h3><br>${rows}<br>
                <h2 style="background:#eee; padding:15px; border-radius:10px;">المجموع النهائي: ${total.toLocaleString()} د.ع</h2>
                <p>شكراً لتعاملكم معنا</p></div>`;
            window.print();
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجلات مكتبة يوسف 📚</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --main-bg: #f8f9fa; --card-shadow: 0 4px 15px rgba(0,0,0,0.05); --primary: #2c3e50; --green: #51b37e; --blue: #4aa3df; --orange: #f39c12; --red: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--main-bg); margin: 0; padding-bottom: 30px; }
        
        /* شاشة الدخول */
        #login-screen { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: var(--card-shadow); text-align: center; }
        
        /* الرأس والتنقل */
        .header { background: white; padding: 15px; text-align: center; box-shadow: var(--card-shadow); position: sticky; top: 0; z-index: 1000; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .nav-link { padding: 10px 25px; border-radius: 25px; border: none; background: #eee; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav-link.active { background: var(--primary); color: white; }

        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; display: none; }
        
        /* شكل المدخلات (مثل الصور) */
        .input-group { background: #f1f1f1; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: white; text-align: right; font-size: 15px; }
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }

        /* تصميم البطاقة (نفس اللي بالصور) */
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: var(--card-shadow); border-right: 5px solid var(--blue); position: relative; }
        .card-title { font-size: 18px; font-weight: bold; color: var(--primary); margin-bottom: 15px; display: flex; align-items: center; justify-content: flex-end; }
        
        .item-box { background: #fdfdfd; border: 1px solid #f0f0f0; border-radius: 10px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .item-info { font-size: 14px; line-height: 1.6; }
        .total-banner { background: var(--primary); color: white; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; margin: 15px 0; font-size: 17px; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-action { padding: 10px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        /* ألوان المخزن */
        .stock-card { border-right-color: var(--green); }
        .badge { padding: 4px 10px; border-radius: 15px; font-size: 12px; margin-right: 10px; }
        .badge-red { background: #ffebee; color: var(--red); }
        .badge-orange { background: #fff3e0; color: var(--orange); }

        .delete-icon { color: var(--red); cursor: pointer; font-weight: bold; border: none; background: none; font-size: 18px; }

        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; top: 0; width: 100%; } }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>📚 مكتبة يوسف</h2>
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button class="btn-main" style="background: var(--primary);" onclick="checkLogin()">دخول</button>
</div>

<div id="main-ui" style="display: none;">
    <div class="header">
        <h3 style="margin:0;">سجلات مكتبة يوسف 📚</h3>
        <div class="nav-tabs">
            <button class="nav-link active" id="tabDebtBtn" onclick="showTab('debt')">👥 الديون</button>
            <button class="nav-link" id="tabStockBtn" onclick="showTab('stock')">📦 المخزن</button>
        </div>
    </div>

    <div class="container" id="debt-page">
        <div class="input-group">
            <label><b>اسم الزبون (للبحث أو الإضافة):</b></label>
            <input type="text" id="custName" placeholder="يوسف عباس حسن">
            <input type="text" id="debtType" placeholder="نوع المادة (دفتر، ملازم...)">
            <div style="display:flex; gap:5px;">
                <input type="number" id="debtPrice" placeholder="السعر">
                <input type="number" id="debtQty" placeholder="العدد" value="1">
            </div>
            <button class="btn-main" style="background: var(--green);" onclick="addDebt()">حفظ في السجل +</button>
        </div>
        <div id="debt-list"></div>
    </div>

    <div class="container" id="stock-page">
        <div class="input-group">
            <label><b>إضافة مادة للمخزن:</b></label>
            <input type="text" id="stName" placeholder="اسم المادة...">
            <input type="number" id="stQty" placeholder="الكمية المتوفرة">
            <button class="btn-main" style="background: var(--blue);" onclick="addStock()">إضافة للمخزن +</button>
        </div>
        <input type="text" id="searchStock" placeholder="🔍 ابحث في المخزن..." oninput="filterStock()" style="margin-bottom:15px; border:2px solid var(--green);">
        <div id="stock-list"></div>
    </div>
</div>

<div id="print-area" style="display:none;"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAwa3TBmBMmuuIxD0R_EVQTLASWivqjIx8",
        authDomain: "maktb-yousif.firebaseapp.com",
        databaseURL: "https://maktb-yousif-default-rtdb.firebaseio.com",
        projectId: "maktb-yousif",
        storageBucket: "maktb-yousif.firebasestorage.app",
        messagingSenderId: "200688688416",
        appId: "1:200688688416:web:1354d536d74fd0accb0b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkLogin() {
        if(document.getElementById('pass').value === "1991") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            showTab('debt');
            loadData();
        } else { alert("كلمة المرور خطأ!"); }
    }

    function showTab(t) {
        document.getElementById('debt-page').style.display = (t=='debt'?'block':'none');
        document.getElementById('stock-page').style.display = (t=='stock'?'block':'none');
        document.getElementById('tabDebtBtn').classList.toggle('active', t=='debt');
        document.getElementById('tabStockBtn').classList.toggle('active', t=='stock');
    }

    // وظائف الديون (نفس منطق الصور)
    function addDebt() {
        const name = document.getElementById('custName').value.trim();
        const type = document.getElementById('debtType').value.trim();
        const price = parseInt(document.getElementById('debtPrice').value);
        const qty = parseInt(document.getElementById('debtQty').value) || 1;
        
        if(name && type && price) {
            const key = btoa(unescape(encodeURIComponent(name))).replace(/=/g, ""); 
            db.ref('records/' + key).child('name').set(name);
            db.ref('records/' + key + '/items').push({
                type: type, amount: price * qty, date: new Date().toLocaleString('ar-IQ')
            });
            document.getElementById('debtType').value = '';
            document.getElementById('debtPrice').value = '';
        }
    }

    // وظائف المخزن
    function addStock() {
        const name = document.getElementById('stName').value.trim();
        const qty = parseInt(document.getElementById('stQty').value) || 0;
        if(name) {
            db.ref('inventory').push({ name: name, qty: qty });
            document.getElementById('stName').value = ''; document.getElementById('stQty').value = '';
        }
    }

    function updateStock(id, cur, change) {
        if(cur + change >= 0) db.ref('inventory/' + id).update({ qty: cur + change });
    }

    function loadData() {
        // تحميل الديون
        db.ref('records').on('value', s => {
            let h = '';
            s.forEach(snap => {
                const d = snap.val(); let sum = 0; let itemsHtml = '';
                if(d.items) Object.keys(d.items).forEach(k => {
                    const i = d.items[k]; sum += i.amount;
                    itemsHtml += `<div class="item-box">
                        <button class="delete-icon" onclick="deleteItem('${snap.key}','${k}')">×</button>
                        <div class="item-info">🔹 <b>${i.type}</b> <br> <small>${i.date}</small></div>
                        <b style="color:${i.amount<0?'var(--green)':'var(--primary)'}">${i.amount.toLocaleString()} د.ع</b>
                    </div>`;
                });
                h += `<div class="card">
                    <div class="card-title">👤 ${d.name}</div>
                    ${itemsHtml}
                    <div class="total-banner">المجموع المتبقي: ${sum.toLocaleString()} د.ع</div>
                    <div class="btn-grid">
                        <button class="btn-action" style="background:var(--blue)" onclick="payPopup('${snap.key}')">💵 تسديد مبلغ</button>
                        <button class="btn-action" style="background:var(--orange)" onclick="printDoc('${snap.key}')">🖨 طباعة كشف</button>
                        <button class="btn-action" style="background:var(--red); grid-column: span 2; margin-top:5px; opacity:0.7;" onclick="deleteCust('${snap.key}')">🗑 حذف السجل</button>
                    </div>
                </div>`;
            });
            document.getElementById('debt-list').innerHTML = h;
        });

        // تحميل المخزن
        db.ref('inventory').on('value', s => {
            let h = '';
            s.forEach(snap => {
                const d = snap.val();
                let badge = d.qty <= 0 ? '<span class="badge badge-red">خلص!</span>' : (d.qty <= 5 ? '<span class="badge badge-orange">قرب يخلص</span>' : '');
                h += `<div class="card stock-card" data-name="${d.name}">
                    <div class="card-title">📦 ${d.name} ${badge}</div>
                    <div style="text-align:center; font-size:22px; margin:10px 0;">الكمية: <b>${d.qty}</b></div>
                    <div class="btn-grid">
                        <button class="btn-action" style="background:var(--green)" onclick="updateStock('${snap.key}',${d.qty},1)">+ شراء</button>
                        <button class="btn-action" style="background:var(--primary)" onclick="updateStock('${snap.key}',${d.qty},-1)">- بيع</button>
                        <button class="btn-action" style="background:var(--red); grid-column: span 2; margin-top:5px; opacity:0.6;" onclick="deleteStock('${snap.key}')">حذف المادة</button>
                    </div>
                </div>`;
            });
            document.getElementById('stock-list').innerHTML = h;
        });
    }

    function payPopup(k) {
        const val = prompt("المبلغ المسدد:");
        if(val) db.ref('records/'+k+'/items').push({ type:"تسديد نقد (واصل)", amount: -parseInt(val), date: new Date().toLocaleString('ar-IQ') });
    }

    function deleteItem(ck, ik) { if(confirm("حذف؟")) db.ref(`records/${ck}/items/${ik}`).remove(); }
    function deleteCust(k) { if(confirm("حذف السجل نهائياً؟")) db.ref('records/'+k).remove(); }
    function deleteStock(k) { if(confirm("حذف المادة؟")) db.ref('inventory/'+k).remove(); }

    function filterStock() {
        const val = document.getElementById('searchStock').value.toLowerCase();
        document.querySelectorAll('.stock-card').forEach(c => {
            c.style.display = c.getAttribute('data-name').toLowerCase().includes(val) ? 'block' : 'none';
        });
    }

    function printDoc(k) {
        db.ref('records/' + k).once('value', s => {
            const d = s.val(); let rows = ''; let total = 0;
            Object.values(d.items).forEach(i => { rows += `<p>${i.date} - ${i.type}: ${i.amount} د.ع</p>`; total+=i.amount; });
            const area = document.getElementById('print-area');
            area.innerHTML = `<div style="direction:rtl; text-align:center;"><h2>مكتبة يوسف</h2><hr><h3>الزبون: ${d.name}</h3>${rows}<hr><h2>المجموع: ${total} د.ع</h2></div>`;
            window.print();
        });
    }
</script>
</body>
</html>

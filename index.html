<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجلات مكتبة يوسف</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --main: #2c3e50; --green: #27ae60; --red: #e74c3c; --blue: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 550px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--main); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .btn-add { background: var(--green); color: white; font-size: 18px; }
        .customer-card { background: #fff; border: 1px solid #eee; padding: 15px; margin-top: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-right: 5px solid var(--blue); }
        .invoice-item { background: #f9f9f9; padding: 10px; margin: 5px 0; border-radius: 8px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .total-box { background: var(--main); color: white; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; font-size: 18px; font-weight: bold; }
        .btn-pay { background: var(--blue); color: white; width: 48%; }
        .btn-del { background: var(--red); color: white; width: 48%; }
        .btn-print { background: #f39c12; color: white; width: 100%; margin-top: 10px; }
        .delete-small { background: none; color: var(--red); width: auto; padding: 0 5px; font-size: 18px; margin: 0; }
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; top: 0; width: 100%; } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">📚 سجلات مكتبة يوسف</h2>
    
    <div style="background: #f0f0f0; padding: 15px; border-radius: 12px; margin-bottom: 20px;">
        <label><b>اسم الزبون (للبحث أو الإضافة):</b></label>
        <input type="text" id="fullName" placeholder="اكتب الاسم الثلاثي بدقة...">
        <input type="text" id="itemType" placeholder="نوع المادة...">
        <div class="grid-inputs">
            <input type="number" id="itemQty" placeholder="العدد" oninput="calc()">
            <input type="number" id="itemPrice" placeholder="سعر المفرد" oninput="calc()">
        </div>
        <input type="number" id="finalPrice" placeholder="الإجمالي" readonly style="background:#e9ecef; font-weight:bold; color:var(--red);">
        <button class="btn-add" onclick="saveToRecord()">حفظ في السجل +</button>
    </div>

    <div id="records-list"></div>
</div>

<div id="print-area" style="display:none;"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAwa3TBmBMmuuIxD0R_EVQTLASWivqjIx8",
        authDomain: "maktb-yousif.firebaseapp.com",
        databaseURL: "https://maktb-yousif-default-rtdb.firebaseio.com",
        projectId: "maktb-yousif",
        storageBucket: "maktb-yousif.firebasestorage.app",
        messagingSenderId: "200688688416",
        appId: "1:200688688416:web:1354d536d74fd0accb0b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function calc() {
        const q = document.getElementById('itemQty').value || 0;
        const p = document.getElementById('itemPrice').value || 0;
        document.getElementById('finalPrice').value = q * p;
    }

    function saveToRecord() {
        const name = document.getElementById('fullName').value.trim();
        const type = document.getElementById('itemType').value;
        const total = parseInt(document.getElementById('finalPrice').value);

        if(name && total > 0) {
            // استخدام الاسم كمفتاح بعد تنظيفه من المسافات الزائدة
            const customerKey = btoa(unescape(encodeURIComponent(name))).replace(/=/g, ""); 
            const ref = db.ref('records/' + customerKey);
            
            ref.child('name').set(name);
            ref.child('items').push({
                type: type,
                amount: total,
                date: new Date().toLocaleString('ar-IQ')
            });
            
            ["itemType","itemQty","itemPrice","finalPrice"].forEach(id => document.getElementById(id).value='');
            alert("تمت الإضافة للسجل");
        } else { alert("اكمل البيانات أولاً"); }
    }

    db.ref('records').on('value', (snapshot) => {
        let html = '';
        snapshot.forEach((customer) => {
            const data = customer.val();
            const cKey = customer.key;
            let sum = 0;
            let itemsHtml = '';

            if(data.items) {
                Object.keys(data.items).forEach(itemId => {
                    const itm = data.items[itemId];
                    sum += itm.amount;
                    itemsHtml += `
                        <div class="invoice-item">
                            <span>🔹 ${itm.type} <br><small>${itm.date}</small></span>
                            <b>${itm.amount.toLocaleString()} د.ع 
                            <button class="delete-small" onclick="deleteItem('${cKey}','${itemId}')">×</button></b>
                        </div>`;
                });
            }

            html += `
                <div class="customer-card">
                    <h3 style="margin:0; color:var(--main);">👤 ${data.name}</h3>
                    <div id="items-${cKey}">${itemsHtml}</div>
                    <div class="total-box">المجموع المتبقي: ${sum.toLocaleString()} د.ع</div>
                    <div style="display:flex; justify-content:space-between; margin-top:10px;">
                        <button class="btn-pay" onclick="payPopup('${cKey}')">📉 تسديد مبلغ</button>
                        <button class="btn-del" onclick="deleteCustomer('${cKey}')">🗑 حذف السجل</button>
                    </div>
                    <button class="btn-print" onclick="printDoc('${cKey}')">🖨 طباعة كشف حساب</button>
                </div>`;
        });
        document.getElementById('records-list').innerHTML = html;
    });

    function payPopup(cKey) {
        const amount = prompt("أدخل المبلغ الذي دفعه الزبون حالياً:");
        if(amount && !isNaN(amount)) {
            db.ref('records/' + cKey + '/items').push({
                type: "تسديد نقد (واصل)",
                amount: -parseInt(amount),
                date: new Date().toLocaleString('ar-IQ')
            });
        }
    }

    function deleteItem(cKey, iId) { if(confirm("حذف هذا السطر؟")) db.ref(`records/${cKey}/items/${iId}`).remove(); }
    function deleteCustomer(cKey) { if(confirm("حذف ملف الزبون بالكامل؟")) db.ref('records/' + cKey).remove(); }

    function printDoc(cKey) {
        db.ref('records/' + cKey).once('value', (s) => {
            const d = s.val();
            let rows = ''; let total = 0;
            Object.values(d.items).forEach(i => {
                rows += `<div style="display:flex; justify-content:space-between; border-bottom:1px dashed #ccc; padding:5px;">
                            <span>${i.date} - ${i.type}</span>
                            <span>${i.amount.toLocaleString()} د.ع</span>
                         </div>`;
                total += i.amount;
            });
            const area = document.getElementById('print-area');
            area.innerHTML = `<div style="text-align:center;"><h2>مكتبة يوسف - كشف حساب</h2><hr>
                <h3>الزبون: ${d.name}</h3><br>${rows}<br>
                <h2 style="background:#eee; padding:10px;">المجموع النهائي: ${total.toLocaleString()} د.ع</h2></div>`;
            window.print();
        });
    }
</script>
</body>
</html>

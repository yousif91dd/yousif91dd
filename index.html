<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة يوسف ✨</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* إعدادات الألوان الافتراضية (الوضع الليلي كما كان) */
        :root { 
            --main-bg: #000; 
            --card-bg: #1a1a1a; 
            --text: #fff; 
            --accent: #ffd700; 
            --border: #333; 
            --apple-card-color: #ffffff; 
            --input-bg: #111;
            --table-bg: #fff;
            --table-text: #000;
        }

        /* إعدادات الوضع النهاري */
        [data-theme="light"] {
            --main-bg: #f2f2f7;
            --card-bg: #ffffff;
            --text: #000;
            --border: #d1d1d6;
            --input-bg: #fff;
            --table-bg: #fff;
            --table-text: #000;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--main-bg); color: var(--text); margin: 0; direction: rtl; transition: 0.5s; }
        .private .hide-val { filter: blur(10px); }

        /* الدخول */
        #login-screen { position: fixed; inset: 0; background: var(--main-bg); z-index: 10000; display: flex; justify-content: center; align-items: center; }
        .login-box { background: var(--card-bg); padding: 35px; border-radius: 30px; width: 85%; max-width: 350px; text-align: center; border: 2px solid var(--accent); }
        .pass-wrapper { position: relative; width: 100%; margin: 10px 0; }
        .eye-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--accent); }
        .login-box input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); box-sizing: border-box; }

        /* الهيدر */
        .header-top { text-align: center; padding: 20px; background: var(--main-bg); color: var(--accent); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .top-icons { position: absolute; right: 15px; top: 20px; display: flex; gap: 10px; }
        .exit-btn { position: absolute; left: 15px; top: 20px; font-size: 12px; cursor: pointer; background: #ff3b30; padding: 6px 12px; border-radius: 10px; color: white; border: none; }
        .icon-btn { font-size: 20px; cursor: pointer; background: rgba(150,150,150,0.1); padding: 8px; border-radius: 12px; border: 1px solid var(--border); color: var(--text); }
        .theme-menu { display: none; position: absolute; right: 10px; top: 65px; background: var(--card-bg); border: 1px solid var(--accent); border-radius: 20px; padding: 15px; z-index: 1001; width: 220px; }
        .theme-menu div { width: 30px; height: 30px; border-radius: 50%; margin: 6px; cursor: pointer; display: inline-block; border: 2px solid #333; }
        
        .totals-bar { display: flex; justify-content: space-around; background: var(--main-bg); padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--accent); }
        
        /* القائمة */
        .quick-box { background: var(--card-bg); margin: 15px; padding: 18px; border-radius: 25px; border: 1px solid var(--border); }
        .q-tabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; }
        .q-tab { flex: 1; min-width: 65px; padding: 10px; border-radius: 10px; background: rgba(150,150,150,0.1); color: #888; font-size: 11px; border:none; cursor: pointer; }
        .q-tab.active { background: var(--accent); color: #000; font-weight: bold; }

        .container { max-width: 650px; margin: auto; display: none; padding: 15px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 18px; margin-bottom: 15px; border-right: 5px solid var(--accent); border-left: 1px solid var(--border); color: var(--text); }
        .search-in { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 15px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); box-sizing: border-box; }
        
        .page-search { width: 100%; padding: 12px; margin: 10px 0 20px 0; border-radius: 12px; border: 1px solid var(--accent); background: var(--input-bg); color: var(--text); outline: none; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .menu-item { padding: 25px; border-radius: 25px; text-align: center; font-weight: bold; color: var(--text); cursor: pointer; border: 1px solid var(--border); background: var(--card-bg); }
        
        table { width: 100%; border-collapse: collapse; background: var(--table-bg); color: var(--table-text); border-radius: 15px; overflow: hidden; margin-top: 15px; }
        th, td { padding: 10px; border: 1px solid #eee; text-align: center; font-size: 12px; }
        .btn-action { padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-size: 11px; margin: 3px; flex: 1; color: #fff; font-weight: bold; }

        /* 🔥 كارت أبل - قياس الوطنية 🔥 */
        #apple-card-ui { 
            width: 340px; height: 210px; border-radius: 15px; padding: 20px; color: #000; margin: 20px auto; position: relative; direction: ltr; text-align: left; 
            background: var(--apple-card-color); border: 1px solid var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.2); overflow: hidden;
        }
        .apple-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; opacity: 0.1; pointer-events: none; }
        .library-header { text-align: center; border-bottom: 1.5px solid var(--accent); padding-bottom: 5px; margin-bottom: 10px; }
        .info-row { margin-bottom: 4px; font-size: 13px; font-weight: 600; color: #000; }
        .telegram-footer { position: absolute; bottom: 12px; width: calc(100% - 40px); border-top: 1px solid rgba(0,0,0,0.1); padding-top: 8px; text-align: center; font-size: 13px; color: #007aff; font-weight: bold; }

        /* الطباعة الاحترافية */
        @media print {
            .no-print, .exit-btn, .top-icons, .quick-box, .menu-grid, .totals-bar, .search-in, .page-search, .btn-action { display: none !important; }
            body { background: white !important; color: black !important; }
            .container { display: block !important; width: 100% !important; margin:0 !important; padding:0 !important; }
            .card { border: 1px solid #000 !important; background: white !important; color: black !important; padding: 20px !important; }
            .card.printing { display: block !important; }
            .card:not(.printing) { display: none !important; }
            table { border: 1px solid #000 !important; }
            #apple-card-ui { border: 1px solid #000 !important; box-shadow: none !important; margin: 0 auto !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color: var(--accent);">مكتبة يوسف ✨</h2>
        <input type="text" id="user-in" placeholder="المستخدم">
        <div class="pass-wrapper">
            <input type="password" id="pass-in" placeholder="كلمة المرور">
            <span class="eye-icon" onclick="togglePass()">👁️</span>
        </div>
        <button onclick="login()" style="width:100%; padding:16px; background: var(--accent); color:#000; border-radius:15px; border:none; font-weight:bold;">دخول 🔒</button>
    </div>
</div>

<div id="app-content" style="display:none;">
    <div id="main-menu" class="no-print">
        <div class="header-top">
            <button class="exit-btn" onclick="location.reload()">خروج</button>
            <div class="top-icons">
                <span class="icon-btn" onclick="toggleDarkMode()" title="وضع ليلي/نهاري">🌓</span>
                <span class="icon-btn" onclick="togglePrivacy()">🔒</span>
                <span class="icon-btn" onclick="toggleThemeMenu()">🎨</span>
            </div>
            <div class="theme-menu" id="t-menu">
                <script>
                    const colors = ['#ffd700', '#ffffff', '#007aff', '#ff3b30', '#34c759', '#af52de', '#ff9500', '#5ac8fa'];
                    colors.forEach((c) => document.write(`<div onclick="setTheme('${c}')" style="background:${c};"></div>`));
                </script>
            </div>
            <h2>مكتبة يوسف ✨</h2>
        </div>

        <div class="totals-bar">
            <div>دائن: <span id="total-debt" class="hide-val">0</span></div>
            <div>مدين: <span id="total-mydebt" class="hide-val">0</span></div>
        </div>

        <div class="quick-box">
            <div class="q-tabs">
                <button class="q-tab active" onclick="switchQ('q-z', this)">👤 دائن</button>
                <button class="q-tab" onclick="switchQ('q-m', this)">🏢 مدين</button>
                <button class="q-tab" onclick="switchQ('q-s', this)">📱 صيانة</button>
                <button class="q-tab" onclick="switchQ('q-x', this)">📦 مخزن</button>
                <button class="q-tab" onclick="switchQ('q-i', this)">💰 وارد</button>
            </div>
            <div id="q-z" class="q-panel"><input type="text" id="fast-z" placeholder="اسم الزبون..." class="search-in"><button onclick="addFast('records','fast-z')" style="width:100%; padding:12px; background:#34c759; color:white; border-radius:12px; border:none;">إضافة</button></div>
            <div id="q-m" class="q-panel" style="display:none;"><input type="text" id="fast-m" placeholder="اسم المكتب..." class="search-in"><button onclick="addFast('my_debts','fast-m')" style="width:100%; padding:12px; background:#5856d6; color:white; border-radius:12px; border:none;">إضافة</button></div>
            <div id="q-s" class="q-panel" style="display:none;"><input type="text" id="fast-s" placeholder="صاحب الجهاز..." class="search-in"><button onclick="addFast('mobile_data','fast-s')" style="width:100%; padding:12px; background:#007aff; color:white; border-radius:12px; border:none;">إضافة جهاز</button></div>
            <div id="q-x" class="q-panel" style="display:none;"><input type="text" id="f-x-n" placeholder="المادة..." class="search-in"><input type="number" id="f-x-q" placeholder="العدد" class="search-in"><button onclick="addStock()" style="width:100%; padding:12px; background:#ff9500; color:white; border-radius:12px; border:none;">للمخزن</button></div>
            <div id="q-i" class="q-panel" style="display:none;"><input type="number" id="f-i-a" placeholder="المبلغ" class="search-in"><button onclick="addIncome()" style="width:100%; padding:12px; background:#34c759; color:white; border-radius:12px; border:none;">وارد</button></div>
        </div>

        <div class="menu-grid">
            <div onclick="nav('debt')" class="menu-item" style="border-top: 3px solid #af52de;">👥 سجل الدائن</div>
            <div onclick="nav('mydebts')" class="menu-item" style="border-top: 3px solid #5856d6;">🏢 سجل المدين</div>
            <div onclick="nav('mobile')" class="menu-item" style="border-top: 3px solid #007aff;">📱 الصيانة</div>
            <div onclick="nav('stock')" class="menu-item" style="border-top: 3px solid #ff9500;">📦 المخزن</div>
            <div onclick="nav('income')" class="menu-item" style="border-top: 3px solid #34c759;">💰 الوارد</div>
            <div onclick="nav('apple')" class="menu-item" style="border-top: 3px solid #ffd700;"> Apple ID</div>
        </div>
    </div>

    <div class="container" id="debt-page">
        <button class="search-in no-print" onclick="home()">⬅️ رجوع</button>
        <input type="text" class="page-search no-print" placeholder="🔍 ابحث عن زبون..." oninput="filterList(this, 'list-debt')">
        <div id="list-debt"></div>
    </div>

    <div class="container" id="mydebts-page">
        <button class="search-in no-print" onclick="home()">⬅️ رجوع</button>
        <input type="text" class="page-search no-print" placeholder="🔍 ابحث عن مكتب..." oninput="filterList(this, 'list-mydebts')">
        <div id="list-mydebts"></div>
    </div>

    <div class="container" id="mobile-page">
        <button class="search-in no-print" onclick="home()">⬅️ رجوع</button>
        <input type="text" class="page-search no-print" placeholder="🔍 ابحث في الصيانة..." oninput="filterList(this, 'list-mobile')">
        <div id="list-mobile"></div>
    </div>

    <div class="container" id="stock-page">
        <button class="search-in no-print" onclick="home()">⬅️ رجوع</button>
        <input type="text" class="page-search no-print" placeholder="🔍 ابحث في المخزن..." oninput="filterList(this, 'list-stock')">
        <div id="list-stock"></div>
    </div>
    
    <div class="container" id="income-page"><button onclick="home()" class="search-in no-print">⬅️ رجوع</button><table><thead><tr><th>المبلغ</th><th>اليوم</th><th>التاريخ</th><th class="no-print">X</th></tr></thead><tbody id="list-income-table"></tbody></table></div>
    
    <div class="container" id="apple-page">
        <button class="search-in no-print" onclick="home()">⬅️ رجوع</button>
        <div class="no-print" style="background:var(--card-bg); padding:20px; border-radius:20px; margin-bottom:10px; border:1px solid var(--border);">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                <span>لون الكارت:</span>
                <input type="color" id="card-color-picker" value="#ffffff" oninput="setAppleCardColor(this.value)" style="width:50px; height:30px; border:none; cursor:pointer;">
            </div>
            <input type="text" id="ap-n" placeholder="Name" oninput="live()" class="search-in">
            <input type="text" id="ap-e" placeholder="Apple ID" oninput="live()" class="search-in">
            <input type="text" id="ap-p" placeholder="Password" oninput="live()" class="search-in">
            <input type="text" id="ap-c" placeholder="Country" oninput="live()" class="search-in">
            <input type="text" id="ap-b" placeholder="Birthday" oninput="live()" class="search-in">
            <input type="text" id="ap-q" placeholder="Security Q" oninput="live()" class="search-in">
        </div>
        
        <div id="apple-card-ui" class="card printing">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="apple-watermark">
            <div class="card-content">
                <div class="library-header"><span class="library-name" style="color:#000;">مكتبة يوسف</span></div>
                <div class="info-row"><b>Name:</b> <span id="v-n">---</span></div>
                <div class="info-row"><b>Apple ID:</b> <span id="v-e" style="color:#007aff;">---</span></div>
                <div class="info-row"><b>Pass:</b> <span id="v-p">---</span></div>
                <div class="info-row"><b>Country:</b> <span id="v-c">---</span></div>
                <div class="info-row"><b>Birthday:</b> <span id="v-b">---</span></div>
                <div class="info-row"><b>Security:</b> <span id="v-q">---</span></div>
                <div class="telegram-footer">Telegram: iji24</div>
            </div>
        </div>
        <div style="display:flex; gap:10px;" class="no-print">
            <button onclick="saveCardAsImage()" class="btn-action" style="background:#34c759; height:50px;">📥 حفظ كصورة</button>
            <button onclick="window.print()" class="btn-action" style="background:var(--accent); color:#000; height:50px;">🖨️ طباعة</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAwa3TBmBMmuuIxD0R_EVQTLASWivqjIx8", databaseURL: "https://maktb-yousif-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    // دالة تبديل الوضع الليلي
    function toggleDarkMode() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        if (currentTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
        }
    }

    // استعادة الوضع المفضل عند التحميل
    const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', savedTheme);

    function togglePass() { const p=document.getElementById('pass-in'); p.type = p.type==='password'?'text':'password'; }
    function login() { if(document.getElementById('user-in').value==="يوسف" && document.getElementById('pass-in').value==="1991"){ document.getElementById('login-screen').style.display='none'; document.getElementById('app-content').style.display='block'; loadAll(); } else alert("خطأ!"); }
    function setTheme(c) { document.documentElement.style.setProperty('--accent', c); document.documentElement.style.setProperty('--border', c); document.getElementById('t-menu').style.display='none'; }
    function setAppleCardColor(c) { document.documentElement.style.setProperty('--apple-card-color', c); }
    function toggleThemeMenu() { const m=document.getElementById('t-menu'); m.style.display=m.style.display==='block'?'none':'block'; }
    function togglePrivacy() { document.body.classList.toggle('private'); }
    function switchQ(id, btn) { document.querySelectorAll('.q-panel').forEach(p=>p.style.display='none'); document.querySelectorAll('.q-tab').forEach(t=>t.classList.remove('active')); document.getElementById(id).style.display='block'; btn.classList.add('active'); }
    function nav(id) { document.getElementById('main-menu').style.display='none'; document.querySelectorAll('.container').forEach(c=>c.style.display='none'); document.getElementById(id+'-page').style.display='block'; }
    function home() { document.querySelectorAll('.container').forEach(c=>c.style.display='none'); document.getElementById('main-menu').style.display='block'; }

    function filterList(input, listId) {
        let filter = input.value.toLowerCase();
        let list = document.getElementById(listId);
        let cards = list.getElementsByClassName('card');
        for (let i = 0; i < cards.length; i++) {
            let text = cards[i].innerText.toLowerCase();
            cards[i].style.display = text.includes(filter) ? "" : "none";
        }
    }

    function loadAll() {
        const groups={'records':'list-debt','my_debts':'list-mydebts','mobile_data':'list-mobile'};
        Object.entries(groups).forEach(([path, target]) => {
            db.ref(path).on('value', s => {
                let h=''; let groupSum = 0;
                s.forEach(snap => {
                    let sum=0, rows=''; const d=snap.val();
                    if(d.items) Object.entries(d.items).forEach(([ik,i])=>{ sum+=i.amount; rows+=`<tr><td>${i.desc}</td><td class="hide-val">${i.amount.toLocaleString()}</td><td class="no-print" onclick="del('${path}/${snap.key}/items/${ik}')">❌</td></tr>`; });
                    groupSum += sum;
                    h+=`<div class="card" id="card-${snap.key}" onclick="toggle('${snap.key}')">
                        <span class="hide-val" style="float:left; color:var(--accent); font-weight:bold;">${sum.toLocaleString()}</span><b>${d.name}</b>
                        <div id="det-${snap.key}" style="display:none; margin-top:15px; border-top:1px dashed var(--border);" onclick="event.stopPropagation()">
                        <div class="only-print"><h3>مكتبة يوسف ✨</h3><p>الزبون: ${d.name}</p></div>
                        <table><thead><tr><th>المادة</th><th>المبلغ</th><th class="no-print">X</th></tr></thead><tbody>${rows}</tbody></table>
                        <div class="only-print"><h4>المجموع: ${sum.toLocaleString()} د.ع</h4></div>
                        <div class="no-print" style="display:flex; gap:5px; margin-top:15px;">
                        <button class="btn-action" onclick="act('${snap.key}','${path}','add')" style="background:#34c759;">+</button>
                        <button class="btn-action" onclick="act('${snap.key}','${path}','pay')" style="background:#007aff;">تسديد</button>
                        <button class="btn-action" onclick="printCard('${snap.key}')" style="background:#8e8e93;">🖨️ طباعة وصل</button>
                        <button class="btn-action" onclick="del('${path}/${snap.key}')" style="background:#ff3b30;">حذف</button></div></div></div>`;
                });
                document.getElementById(target).innerHTML=h;
                if(path==='records') document.getElementById('total-debt').innerText = groupSum.toLocaleString() + " د.ع";
                if(path==='my_debts') document.getElementById('total-mydebt').innerText = groupSum.toLocaleString() + " د.ع";
            });
        });
        db.ref('inventory').on('value', s => {
            let h=''; s.forEach(snap => { const v=snap.val(); h+=`<div class="card"><b>${v.name}</b> <span style="float:left; color:var(--accent);">الكمية: ${v.qty}</span><br><button class="no-print" onclick="del('inventory/${snap.key}')" style="background:none; border:none; color:#ff3b30; margin-top:10px; cursor:pointer;">🗑️</button></div>`; });
            document.getElementById('list-stock').innerHTML=h;
        });
        db.ref('monthly_income').on('value', s => {
            let h=''; s.forEach(snap => { const v=snap.val(); h+=`<tr><td class="hide-val">${v.amount.toLocaleString()}</td><td>${v.day}</td><td>${v.date}</td><td class="no-print" onclick="del('monthly_income/${snap.key}')">❌</td></tr>`; });
            document.getElementById('list-income-table').innerHTML=h;
        });
    }

    function saveCardAsImage() {
        const card = document.getElementById('apple-card-ui');
        html2canvas(card, { scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'AppleID_Card_' + (document.getElementById('v-n').innerText) + '.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }

    function addStock() { const n=document.getElementById('f-x-n').value, q=document.getElementById('f-x-q').value; if(n&&q){ db.ref('inventory').push({name:n, qty:q}); document.getElementById('f-x-n').value=''; document.getElementById('f-x-q').value=''; } }
    function addIncome() { const a=document.getElementById('f-i-a').value; if(a){ const d=new Date(); const days=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"]; db.ref('monthly_income').push({amount:parseInt(a), date:d.toLocaleDateString('en-GB'), day:days[d.getDay()]}); document.getElementById('f-i-a').value=''; } }
    function addFast(p, i) { const n=document.getElementById(i).value; if(n){ db.ref(p).push({name:n}); document.getElementById(i).value=''; } }
    function act(k,p,t) { const m=prompt("المادة/التسديد:"), a=prompt("المبلغ:"); if(m&&a) db.ref(p+'/'+k+'/items').push({desc:m, amount:t==='add'?parseInt(a):-parseInt(a)}); }
    function del(p) { if(confirm("حذف؟")) db.ref(p).remove(); }
    function toggle(id) { const el=document.getElementById('det-'+id); el.style.display=el.style.display==='block'?'none':'block'; }
    function printCard(id) { document.querySelectorAll('.card').forEach(c=>c.classList.remove('printing')); document.getElementById('card-'+id).classList.add('printing'); window.print(); }
    function live() { document.getElementById('v-n').innerText=document.getElementById('ap-n').value || "---"; document.getElementById('v-e').innerText=document.getElementById('ap-e').value || "---"; document.getElementById('v-p').innerText=document.getElementById('ap-p').value || "---"; document.getElementById('v-c').innerText=document.getElementById('ap-c').value || "---"; document.getElementById('v-b').innerText=document.getElementById('ap-b').value || "---"; document.getElementById('v-q').innerText=document.getElementById('ap-q').value || "---"; }
</script>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام يوسف المحاسبي V43.0 👑</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --black: #1a1a1a; --red: #e74c3c; --green: #27ae60; --blue: #2980b9; --orange: #f39c12; --gray: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--gray); margin: 0; direction: rtl; }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; border: 8px solid var(--gold); }
        .login-box { background: white; padding: 30px; border-radius: 25px; width: 85%; max-width: 350px; text-align: center; }
        .pass-container { position: relative; width: 100%; }
        .login-box input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .eye-icon { position: absolute; left: 10px; top: 18px; cursor: pointer; color: #777; }
        #welcome-overlay { position: fixed; inset: 0; background: var(--black); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10001; color: var(--gold); }

        .header-top { text-align: center; padding: 20px; background: var(--black); color: var(--gold); border-bottom: 5px solid var(--gold); border-radius: 0 0 30px 30px; }
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px; }
        .dash-item { background: white; padding: 10px; border-radius: 15px; text-align: center; border-bottom: 3px solid var(--gold); }

        .card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 12px; border-right: 12px solid var(--gold); cursor: pointer; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card.danger-zone { border-right-color: var(--red); background: #fff8f8; }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .total-badge { background: var(--black); color: var(--gold); padding: 5px 12px; border-radius: 10px; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; background: #ccc; }
        .dot-old { background: var(--orange) !important; }
        .dot-v-old { background: var(--red) !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .quick-box { background: white; margin: 10px 15px; padding: 15px; border-radius: 20px; border: 1px solid var(--gold); }
        .quick-tabs { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 10px; }
        .q-tab { flex: 0 0 auto; padding: 8px 15px; border-radius: 10px; border: none; background: #eee; font-weight: bold; font-size: 12px; cursor: pointer; }
        .q-tab.active { background: var(--gold); color: black; }
        .q-content { display: none; } .q-content.active { display: block; }
        .q-input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .menu-item { background: white; padding: 20px; border-radius: 20px; text-align: center; font-weight: bold; cursor: pointer; border: 1px solid #eee; }
        .menu-item span { display: block; font-size: 30px; margin-bottom: 5px; }

        .container { max-width: 600px; margin: auto; display: none; padding: 15px; }
        .search-input { width: 100%; padding: 12px; border-radius: 15px; border: 2px solid var(--gold); text-align: center; outline: none; margin-bottom: 10px; }
        .back-btn { background: var(--black); color: white; width: 100%; padding: 14px; border-radius: 12px; border: none; margin-bottom: 15px; cursor: pointer; font-weight: bold; }
        
        .card-details { display: none; margin-top: 15px; border-top: 1px dashed #ddd; padding-top: 10px; }
        .op-btns { display: flex; gap: 8px; margin-top: 12px; }
        .btn-add { background: var(--blue); color: white; flex: 1; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-pay { background: var(--green); color: white; flex: 1; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        td { padding: 8px; border-bottom: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>نظام الملك يوسف 👑</h2>
        <input type="text" id="user-in" placeholder="اسم المستخدم">
        <div class="pass-container">
            <input type="password" id="pass-in" placeholder="كلمة المرور">
            <span class="eye-icon" onclick="togglePass()">👁️</span>
        </div>
        <button onclick="login()" style="background:var(--black); color:var(--gold); border:none; padding:15px; width:100%; border-radius:12px; font-weight:bold; cursor:pointer;">دخول المحاسبة 🔒</button>
    </div>
</div>

<div id="welcome-overlay"><h1>👑</h1><h2 id="welcome-text"></h2></div>

<div id="app-content" style="display:none;">
    <div id="main-menu">
        <div class="header-top"><h2 id="user-display">مكتبة يوسف 🏆</h2></div>
        <div class="dash-grid">
            <div class="dash-item"><small>مجموع الدائن</small><br><b id="stat-debt">0</b></div>
            <div class="dash-item"><small>مجموع المدين</small><br><b id="stat-mydebt">0</b></div>
            <div class="dash-item"><small>نواقص المخزن</small><br><b id="stat-stock" style="color:red">0</b></div>
        </div>

        <div class="quick-box no-print">
            <div class="quick-tabs">
                <button class="q-tab active" onclick="showQ('q1', this)">👤 زبون جديد</button>
                <button class="q-tab" onclick="showQ('q2', this)">📱 صيانة جهاز</button>
                <button class="q-tab" onclick="showQ('q3', this)">🏢 مجهز/شركة</button>
                <button class="q-tab" onclick="showQ('q4', this)">📦 بضاعة</button>
                <button class="q-tab" onclick="showQ('q5', this)">💰 تسجيل وارد</button>
            </div>
            <div id="q1" class="q-content active"><input type="text" id="qd-n" class="q-input" placeholder="اسم الزبون لفتح سجل دائن"><button onclick="addBase('records','qd-n')" style="background:var(--green); color:white; border:none; width:100%; padding:10px; border-radius:10px; margin-top:5px;">إضافة ✅</button></div>
            <div id="q2" class="q-content"><input type="text" id="qm-n" class="q-input" placeholder="اسم صاحب الجهاز"><button onclick="addBase('mobile_data','qm-n')" style="background:var(--blue); color:white; border:none; width:100%; padding:10px; border-radius:10px; margin-top:5px;">فتح وصل ✅</button></div>
            <div id="q3" class="q-content"><input type="text" id="qt-n" class="q-input" placeholder="اسم المجهز لفتح سجل مدين"><button onclick="addBase('my_debts','qt-n')" style="background:var(--orange); color:white; border:none; width:100%; padding:10px; border-radius:10px; margin-top:5px;">إضافة ✅</button></div>
            <div id="q4" class="q-content"><input type="text" id="qs-n" class="q-input" placeholder="المادة"><input type="number" id="qs-q" class="q-input" placeholder="الكمية"><button onclick="addStock()" style="background:var(--black); color:white; border:none; width:100%; padding:10px; border-radius:10px; margin-top:5px;">تخزين ✅</button></div>
            <div id="q5" class="q-content"><select id="qi-w" class="q-input"><option>يوسف</option><option>يحيى</option></select><input type="number" id="qi-a" class="q-input" placeholder="المبلغ الصافي 💰"><button onclick="addInc()" style="background:var(--gold); border:none; width:100%; padding:12px; border-radius:10px; margin-top:10px; font-weight:bold;">تثبيت الوارد ⚡</button></div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="nav('debt')" style="color:var(--red)"><span>👥</span>سجل الدائن</div>
            <div class="menu-item" onclick="nav('mobile')" style="color:var(--blue)"><span>📱</span>صيانة الموبايل</div>
            <div class="menu-item" onclick="nav('mydebts')" style="color:var(--orange)"><span>🏢</span>سجل المدين</div>
            <div class="menu-item" onclick="nav('income')" style="color:var(--green)"><span>💰</span>الوارد اليومي</div>
            <div class="menu-item" onclick="nav('stock')" style="color:var(--black)"><span>📦</span>المخزن</div>
            <div class="menu-item" onclick="location.reload()" style="color:#777"><span>🚪</span>خروج آمن</div>
        </div>
    </div>

    <div class="container" id="debt-page"><button class="back-btn" onclick="home()">🏠 رجوع للقائمة</button><input type="text" class="search-input" placeholder="🔍 ابحث في سجل الدائن..." onkeyup="filter('list-debt', this.value)"><div id="list-debt"></div></div>
    <div class="container" id="mobile-page"><button class="back-btn" onclick="home()">🏠 رجوع للقائمة</button><input type="text" class="search-input" placeholder="🔍 ابحث عن جهاز..." onkeyup="filter('list-mobile', this.value)"><div id="list-mobile"></div></div>
    <div class="container" id="mydebts-page"><button class="back-btn" onclick="home()">🏠 رجوع للقائمة</button><input type="text" class="search-input" placeholder="🔍 ابحث في سجل المدين..." onkeyup="filter('list-mydebts', this.value)"><div id="list-mydebts"></div></div>
    <div class="container" id="income-page"><button class="back-btn" onclick="home()">🏠 رجوع للقائمة</button><div id="total-inc" style="background:black; color:var(--gold); padding:15px; text-align:center; border-radius:15px; font-size:22px; margin-bottom:10px;">0</div><div id="list-income"></div></div>
    <div class="container" id="stock-page"><button class="back-btn" onclick="home()">🏠 رجوع للقائمة</button><div id="list-stock" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAwa3TBmBMmuuIxD0R_EVQTLASWivqjIx8", databaseURL: "https://maktb-yousif-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    function togglePass() { const p = document.getElementById('pass-in'); p.type = p.type === "password" ? "text" : "password"; }

    function login() {
        const u = document.getElementById('user-in').value, p = document.getElementById('pass-in').value;
        if((u==="يوسف"||u==="يحيى")&&p==="1991") {
            document.getElementById('login-screen').style.display='none';
            document.getElementById('welcome-overlay').style.display='flex';
            document.getElementById('welcome-text').innerText = "أهلاً بك يا ملك " + u;
            setTimeout(() => {
                document.getElementById('welcome-overlay').style.display='none';
                document.getElementById('app-content').style.display='block';
                loadAll();
            }, 1200);
        } else alert("خطأ! ❌");
    }

    function toggleCard(id, name, lastOpType) {
        const det = document.getElementById('details-' + id);
        if(det.style.display === "block") det.style.display = "none";
        else { 
            document.querySelectorAll('.card-details').forEach(el=>el.style.display='none'); 
            det.style.display="block"; 
            if(lastOpType === 'pay') alert("⚠️ انتبه يا ملك! " + name + " سدد آخر مرة ✅");
        }
    }

    function loadAll() {
        const groups={'records':['list-debt','stat-debt','👤'],'mobile_data':['list-mobile',null,'📱'],'my_debts':['list-mydebts','stat-mydebt','🏢']};
        Object.entries(groups).forEach(([path, [target, stat, icon]]) => {
            db.ref(path).on('value', s => {
                let h='', grand=0; s.forEach(snap => {
                    const d=snap.val(); let sum=0, rows='', lastTS=0, lastOp='none';
                    if(d.items) {
                        const itemsArr = Object.entries(d.items);
                        itemsArr.forEach(([ik,i])=>{ 
                            sum+=i.amount; if(i.ts && i.ts > lastTS) { lastTS = i.ts; lastOp = (i.amount < 0) ? 'pay' : 'add'; }
                            rows+=`<tr><td>${i.desc}</td><td style="color:${i.amount<0?'var(--green)':'var(--red)'}; font-weight:bold;">${i.amount.toLocaleString()}</td><td onclick="event.stopPropagation(); del('${path}/${snap.key}/items/${ik}')">❌</td></tr>`; 
                        });
                    }
                    let dot = ''; if(lastTS > 0) { const dff = (Date.now()-lastTS)/864e5; if(dff>30) dot='dot-v-old'; else if(dff>7) dot='dot-old'; }
                    grand+=sum; let danger = (sum>=100000 && path==='records')?'danger-zone':'';
                    let paySign = (lastOp === 'pay' || sum <= 0) ? ' ✅' : '';

                    h+=`<div class="card ${danger}" data-name="${d.name}" onclick="toggleCard('${snap.key}', '${d.name}', '${lastOp}')">
                        <div class="card-header"><b>${icon} ${d.name}${paySign}</b> <span class="total-badge"><span class="status-dot ${dot}"></span>${sum.toLocaleString()}</span></div>
                        <div class="card-details" id="details-${snap.key}" onclick="event.stopPropagation()">
                            <div class="card-tools"><span onclick="window.print()">🖨️</span><span onclick="editName('${path}','${snap.key}','${d.name}')">✏️</span><span onclick="del('${path}/${snap.key}')">🗑️</span></div>
                            <table>${rows}</table>
                            <div class="op-btns"><button class="btn-add" onclick="act('${snap.key}','${path}','add')">+ مادة</button><button class="btn-pay" onclick="act('${snap.key}','${path}','pay')">💰 تسديد</button></div>
                        </div></div>`;
                });
                document.getElementById(target).innerHTML=h; if(stat) document.getElementById(stat).innerText=grand.toLocaleString();
            });
        });

        db.ref('stock').on('value', s => {
            let h='', low=0; s.forEach(snap => { const d=snap.val(); if(d.qty<=3) low++;
                h += `<div class="card" style="text-align:center; border-bottom:5px solid ${d.qty<=3?'red':'blue'};">
                    <h4>${d.name}</h4><b>الكمية: ${d.qty}</b>
                    <div class="op-btns"><button onclick="db.ref('stock/${snap.key}').update({qty:${d.qty+1}})">+</button><button onclick="db.ref('stock/${snap.key}').update({qty:${Math.max(0,d.qty-1)}})">-</button></div><span onclick="del('stock/${snap.key}')">🗑️</span></div>`;
            });
            document.getElementById('list-stock').innerHTML=h; document.getElementById('stat-stock').innerText=low;
        });

        db.ref('monthly_income').on('value', s => {
            let h='', total=0; s.forEach(snap => { const v=snap.val(); total+=v.amount;
                h=`<div class="card" style="border-right-color:var(--green)">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${v.amount.toLocaleString()} د.ع</b>
                        <span style="font-size:12px; color:#555;"><b>${v.day}</b> | ${v.date}</span>
                    </div>
                    <small>المدخل: ${v.who}</small>
                    <span style="position:absolute; left:10px; bottom:10px; color:red;" onclick="del('monthly_income/${snap.key}')">🗑️</span>
                   </div>`+h;
            });
            document.getElementById('list-income').innerHTML=h; document.getElementById('total-inc').innerText="مجموع الوارد الكلي: "+total.toLocaleString();
        });
    }

    function act(k, p, t) { 
        const m=prompt("نوع المادة:"); 
        const a=prompt("المبلغ:"); 
        if(m&&a) db.ref(p+'/'+k+'/items').push({desc:m, amount:t==='add'?parseInt(a):-parseInt(a), ts: Date.now()}); 
    }
    
    function editName(p, k, old) { const n=prompt("تعديل الاسم:", old); if(n) db.ref(p+'/'+k).update({name:n}); }
    function del(p) { if(confirm("حذف؟")) db.ref(p).remove(); }
    function filter(id, q) { const cards=document.getElementById(id).getElementsByClassName('card'); for(let c of cards) c.style.display=c.getAttribute('data-name').toLowerCase().includes(q.toLowerCase())?"":"none"; }
    function nav(id) { document.querySelectorAll('.container').forEach(c=>c.style.display='none'); document.getElementById('main-menu').style.display='none'; document.getElementById(id+'-page').style.display='block'; window.scrollTo(0,0); }
    function home() { document.querySelectorAll('.container').forEach(c=>c.style.display='none'); document.getElementById('main-menu').style.display='block'; }
    function showQ(id, btn) { document.querySelectorAll('.q-content').forEach(c=>c.classList.remove('active')); document.querySelectorAll('.q-tab').forEach(b=>b.classList.remove('active')); document.getElementById(id).classList.add('active'); btn.classList.add('active'); }
    function addBase(p, i) { const n=document.getElementById(i).value; if(n){ const k=btoa(unescape(encodeURIComponent(n))).replace(/=/g,""); db.ref(p+'/'+k).set({name:n}); document.getElementById(i).value=''; alert("تمت الإضافة ✅"); } }
    function addStock() { const n=document.getElementById('qs-n').value, q=parseInt(document.getElementById('qs-q').value)||0; if(n){ db.ref('stock').push({name:n, qty:q}); document.getElementById('qs-n').value=''; document.getElementById('qs-q').value=''; } }
    function addInc() { 
        const w=document.getElementById('qi-w').value, a=parseInt(document.getElementById('qi-a').value); 
        if(a){ 
            const now=new Date(); const days = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
            db.ref('monthly_income').push({who: w, amount: a, day: days[now.getDay()], date: now.toLocaleDateString('ar-IQ'), ts: Date.now()}); 
            document.getElementById('qi-a').value=''; alert("تم تثبيت الوارد ✅"); 
        } 
    }
</script>
</body>
</html>

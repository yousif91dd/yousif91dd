<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة يوسف الاحترافية</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --main: #2c3e50; --green: #27ae60; --blue: #3498db; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .app-card { background: white; max-width: 500px; margin: 20px auto; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 8px solid var(--main); }
        h2 { color: var(--main); font-size: 24px; margin-bottom: 20px; text-shadow: 1px 1px 2px #eee; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; font-size: 16px; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--blue); outline: none; }
        .btn-save { background: var(--green); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3); }
        .debt-item { background: #fff; border: 1px solid #eee; padding: 15px; margin-top: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .debt-item:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .info { flex-grow: 1; text-align: right; }
        .name { font-weight: bold; color: var(--main); font-size: 18px; display: block; }
        .price { color: #e74c3c; font-weight: bold; }
        .btns { display: flex; gap: 8px; margin-right: 10px; }
        .btn-p { background: var(--blue); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 14px; }
        .btn-d { background: #ff4757; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 14px; }
        .total-box { background: var(--main); color: white; padding: 18px; border-radius: 15px; margin-top: 25px; font-size: 22px; font-weight: bold; }
        @media print { body * { visibility: hidden; } .print-box, .print-box * { visibility: visible; } .print-box { position: absolute; top: 0; width: 100%; text-align: center; border: 2px dashed #000; padding: 30px; } }
    </style>
</head>
<body>

<div class="app-card">
    <h2>📚 مكتبة يوسف</h2>
    <input type="text" id="n" placeholder="اسم الزبون...">
    <input type="number" id="p" placeholder="المبلغ (د.ع)...">
    <button class="btn-save" onclick="save()">حفظ الدين +</button>
    <div id="list"></div>
    <div class="total-box">المجموع: <span id="total">0</span> د.ع</div>
</div>

<div id="printArea" class="print-box" style="display:none;"></div>

<script>
    // ** ملاحظة: لازم تحط مفاتيح الفايربيس مالتك هنا حتى يشتغل الحفظ **
    const firebaseConfig = { apiKey: "AIza...", databaseURL: "https://..." }; 
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function save() {
        const name = document.getElementById('n').value;
        const price = document.getElementById('p').value;
        if(name && price) {
            db.ref('debts').push({ name: name, amount: parseInt(price), date: new Date().toLocaleDateString('ar-EG') });
            document.getElementById('n').value=''; document.getElementById('p').value='';
        }
    }

    db.ref('debts').on('value', (s) => {
        let h = ''; let t = 0;
        s.forEach((child) => {
            const d = child.val(); t += d.amount;
            h += `<div class="debt-item">
                <div class="btns">
                    <button class="btn-p" onclick="prnt('${d.name}','${d.amount}')">🖨️</button>
                    <button class="btn-d" onclick="del('${child.key}')">🗑️</button>
                </div>
                <div class="info">
                    <span class="name">${d.name}</span>
                    <span class="price">${d.amount.toLocaleString()} د.ع</span>
                </div>
            </div>`;
        });
        document.getElementById('list').innerHTML = h;
        document.getElementById('total').innerText = t.toLocaleString();
    });

    function del(id) { if(confirm("حذف؟")) db.ref('debts/'+id).remove(); }
    function prnt(n, a) {
        const area = document.getElementById('printArea');
        area.innerHTML = `<h1>وصل مكتبة يوسف</h1><hr><h3>الزبون: ${n}</h3><h3>المبلغ: ${a} د.ع</h3><p>تاريخ: ${new Date().toLocaleDateString()}</p>`;
        window.print();
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة يوسف - نظام الديون</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --main: #2c3e50; --green: #27ae60; --bg: #f1f2f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: none; } /* مخفي حتى يتم التأكد من السر */
        .card { max-width: 450px; margin: 20px auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 10px solid var(--main); text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; }
        .btn-add { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--green); color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
        .debt-item { background: #fff; border: 1px solid #eee; padding: 15px; margin-top: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-p { background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .total-box { background: var(--main); color: white; padding: 20px; border-radius: 15px; margin-top: 25px; font-size: 22px; font-weight: bold; }
        @media print { body * { visibility: hidden; } .print-box, .print-box * { visibility: visible; } .print-box { position: absolute; top: 0; width: 100%; text-align: center; border: 2px dashed #000; padding: 30px; } }
    </style>
</head>
<body>

<script>
    // نظام حماية بسيط بكلمة سر
    const password = prompt("الرجاء إدخال كلمة السر للدخول إلى نظام مكتبة يوسف:");
    if (password === "1991") {
        document.body.style.display = "block"; // إظهار الصفحة إذا كانت الصح
    } else {
        alert("كلمة سر خاطئة! سيتم إغلاق النظام.");
        window.location.href = "about:blank"; // توجيه لصفحة فارغة
    }
</script>

<div class="card">
    <h2>📚 مكتبة يوسف - نظام الديون</h2>
    <input type="text" id="n" placeholder="اسم الزبون...">
    <input type="number" id="p" placeholder="المبلغ...">
    <button class="btn-add" onclick="save()">حفظ الدين +</button>
    <div id="list"></div>
    <div class="total-box">المجموع الكلي: <span id="total">0</span> د.ع</div>
</div>

<div id="printArea" class="print-box" style="display:none;"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAwa3TBmBMmuuIxD0R_EVQTLASWivqjIx8",
        authDomain: "maktb-yousif.firebaseapp.com",
        databaseURL: "https://maktb-yousif-default-rtdb.firebaseio.com",
        projectId: "maktb-yousif",
        storageBucket: "maktb-yousif.firebasestorage.app",
        messagingSenderId: "200688688416",
        appId: "1:200688688416:web:1354d536d74fd0accb0b45"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function save() {
        const name = document.getElementById('n').value;
        const price = document.getElementById('p').value;
        if(name && price) {
            db.ref('debts').push({ name: name, amount: parseInt(price) });
            document.getElementById('n').value=''; document.getElementById('p').value='';
        }
    }

    db.ref('debts').on('value', (s) => {
        let h = ''; let t = 0;
        s.forEach((child) => {
            const d = child.val(); t += d.amount;
            h += `<div class="debt-item">
                <button class="btn-p" onclick="prnt('${d.name}','${d.amount}')">🖨️ وصل</button>
                <div style="text-align:right;">
                    <b>${d.name}</b><br>
                    <span style="color:red;">${d.amount.toLocaleString()} د.ع</span>
                </div>
            </div>`;
        });
        document.getElementById('list').innerHTML = h;
        document.getElementById('total').innerText = t.toLocaleString();
    });

    function prnt(n, a) {
        const area = document.getElementById('printArea');
        area.innerHTML = `<h1>وصل مكتبة يوسف</h1><hr><h3>الزبون: ${n}</h3><h3>المبلغ: ${a} د.ع</h3>`;
        window.print();
    }
</script>
</body>
</html>

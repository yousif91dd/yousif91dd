<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام يوسف الملكي الشامل 🏆</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --black: #1a1a1a; --white: #fff; --red: #e74c3c; --green: #27ae60; --blue: #2980b9; --gray: #f4f4f4; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--gray); margin: 0; direction: rtl; }
        
        /* الدخول والترحيب */
        #login-screen { position: fixed; inset: 0; background: var(--black); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: var(--white); padding: 30px; border-radius: 25px; width: 85%; max-width: 350px; text-align: center; border: 2px solid var(--gold); }
        #welcome-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 9999; color: var(--gold); font-size: 22px; text-align: center; font-weight: bold; }

        /* الواجهة */
        #app-content { display: none; padding: 15px; }
        .header-top { text-align: center; padding: 15px; background: var(--black); color: var(--gold); border-radius: 20px; margin-bottom: 20px; border-bottom: 4px solid var(--gold); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 500px; margin: auto; }
        .menu-item { background: var(--white); padding: 25px 5px; border-radius: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; border-bottom: 5px solid #ccc; font-weight: bold; }
        .menu-item span { font-size: 35px; display: block; margin-bottom: 8px; }

        /* الأقسام */
        .container { max-width: 600px; margin: auto; display: none; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .page-title { background: var(--gold); color: var(--black); padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; margin-bottom: 15px; }
        .back-btn { background: var(--black); color: var(--white); border: none; padding: 10px; border-radius: 10px; width: 100%; margin-bottom: 15px; cursor: pointer; }
        
        .card { background: var(--white); border-radius: 15px; padding: 15px; margin-bottom: 15px; border-right: 8px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .input-panel { background: var(--white); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #ddd; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .total-box { background: var(--black); color: var(--gold); padding: 10px; border-radius: 10px; text-align: center; font-size: 18px; font-weight: bold; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { padding: 8px; border-bottom: 1px solid #eee; text-align: center; }
        
        /* تنبيه المخزن */
        .low-stock { background: #ffeaea !important; color: var(--red); font-weight: bold; }
        .qty-btn { padding: 4px 8px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 0 2px; }
        
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .btn-op { padding: 8px; border: none; border-radius: 8px; color: white; cursor: pointer; font-size: 11px; font-weight: bold; }
        
        @media print { body * { visibility: hidden; } .print-area, .print-area * { visibility: visible; } .print-area { position: absolute; left: 0; top: 0; width: 100%; padding: 20px; } }
    </style>
</head>
<body>

<div id="welcome-overlay">👑 أهلاً بك يا يوسف 👑<br>نظامك الملكي الموحد جاهز...</div>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color:var(--black)">دخول يوسف 🛡️</h2>
        <input type="text" id="u-in" placeholder="اسم المستخدم">
        <input type="password" id="p-in" placeholder="كلمة المرور">
        <button onclick="login()" style="background:var(--black); color:var(--gold); border:none; padding:12px; border-radius:10px; width:100%; font-weight:bold; cursor:pointer; margin-top:10px;">دخول 🔓</button>
    </div>
</div>

<div id="app-content">
    <div id="main-menu">
        <div class="header-top"><h2>مكتبة يوسف للإدارة 🏆</h2></div>
        <div class="menu-grid">
            <div class="menu-item" style="border-color: var(--green);" onclick="nav('debt','ديون عامة 👥')"><span>👥</span>ديون عامة</div>
            <div class="menu-item" style="border-color: var(--gold);" onclick="nav('income','الدخل الشهري 📅')"><span>📅</span>الدخل الشهري</div>
            <div class="menu-item" style="border-color: #e67e22;" onclick="nav('mydebts','ديوني (عليّ) 💸')"><span>💸</span>ديوني (عليّ)</div>
            <div class="menu-item" style="border-color: var(--blue);" onclick="nav('mobile', 'صيانة الموبايل 📱')"><span>📱</span>الموبايل</div>
            <div class="menu-item" style="border-color: var(--black);" onclick="nav('stock','المخزن 📦')"><span>📦</span>المخزن</div>
            <div class="menu-item" style="border-color: var(--red);" onclick="location.reload()"><span>🚪</span>خروج</div>
        </div>
    </div>

    <div class="container" id="debt-page"><div class="page-title">ديون عامة 👥</div><button class="back-btn" onclick="home()">🏠 رجوع</button>
        <div class="input-panel"><input type="text" id="d-name" placeholder="الاسم"><input type="text" id="d-item" placeholder="المادة"><input type="number" id="d-amt" placeholder="المبلغ"><button onclick="add('records','d-name','d-item','d-amt')" style="background:var(--green); color:white; width:100%; padding:10px; border:none; border-radius:8px;">إضافة 👥</button></div>
        <div id="list-debt"></div></div>

    <div class="container" id="income-page"><div class="page-title">الدخل الشهري 📅</div><button class="back-btn" onclick="home()">🏠 رجوع</button>
        <div class="total-box">الصافي: <span id="net">0</span> د.ع</div>
        <div class="input-panel"><select id="i-who"><option>يوسف</option><option>يحيى</option></select><select id="i-type"><option value="وارد">💰 وارد</option><option value="مصاريف">🛠 مصاريف</option></select><input type="number" id="i-amt" placeholder="المبلغ"><button onclick="addInc()" style="background:var(--gold); width:100%; padding:10px; border:none; border-radius:8px;">حفظ ✅</button></div>
        <div id="list-income"></div></div>

    <div class="container" id="mydebts-page"><div class="page-title">ديوني (عليّ للغير) 💸</div><button class="back-btn" onclick="home()">🏠 رجوع</button>
        <div class="input-panel"><input type="text" id="my-name" placeholder="التاجر"><input type="text" id="my-note" placeholder="المادة"><input type="number" id="my-amt" placeholder="المبلغ"><input type="file" id="my-img" accept="image/*"><button onclick="addMyD()" style="background:var(--black); color:var(--gold); width:100%; padding:10px; border:none; border-radius:8px;">حفظ ورفع الوصل 📸</button></div>
        <div id="list-mydebts"></div></div>

    <div class="container" id="mobile-page"><div class="page-title">صيانة الموبايل 📱</div><button class="back-btn" onclick="home()">🏠 رجوع</button>
        <div class="input-panel"><input type="text" id="m-name" placeholder="الزبون"><input type="text" id="m-desc" placeholder="العطل"><input type="number" id="m-amt" placeholder="السعر"><button onclick="add('mobile_data','m-name','m-desc','m-amt')" style="background:var(--blue); color:white; width:100%; padding:10px; border:none; border-radius:8px;">إضافة 📱</button></div>
        <div id="list-mobile"></div></div>

    <div class="container" id="stock-page"><div class="page-title">المخزن الذكي 📦</div><button class="back-btn" onclick="home()">🏠 رجوع</button>
        <div class="input-panel"><input type="text" id="s-item" placeholder="المادة"><input type="number" id="s-qty" placeholder="الكمية"><button onclick="addS()" style="background:var(--black); color:white; width:100%; padding:10px; border:none; border-radius:8px;">حفظ 📦</button></div>
        <table><thead><tr style="background:#eee"><th>المادة</th><th>الكمية</th><th>تحكم</th></tr></thead><tbody id="list-stock"></tbody></table></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAwa3TBmBMmuuIxD0R_EVQTLASWivqjIx8", databaseURL: "https://maktb-yousif-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function login() {
        if(document.getElementById('u-in').value==="يوسف" && document.getElementById('p-in').value==="1991") {
            document.getElementById('login-screen').style.display='none';
            document.getElementById('welcome-overlay').style.display='flex';
            setTimeout(() => { document.getElementById('welcome-overlay').style.display='none'; document.getElementById('app-content').style.display='block'; loadData(); }, 1500);
        } else { alert("خطأ! ❌"); }
    }

    const getFullDate = () => {
        const d = new Date();
        return d.toLocaleDateString('ar-IQ', { weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' }).replace("،", " |");
    };

    function nav(id, title) {
        document.getElementById('main-menu').style.display='none';
        document.querySelectorAll('.container').forEach(c=>c.style.display='none');
        document.getElementById(id+'-page').style.display='block';
        loadData();
    }
    function home() { document.querySelectorAll('.container').forEach(c=>c.style.display='none'); document.getElementById('main-menu').style.display='block'; }

    // دوال الإضافة الشاملة
    function add(path, nid, iid, pid) {
        const n = document.getElementById(nid).value, itm = document.getElementById(iid).value, p = parseInt(document.getElementById(pid).value);
        if(n && itm && p) {
            const key = btoa(unescape(encodeURIComponent(n))).replace(/=/g, "");
            db.ref(path+'/'+key).child('name').set(n);
            db.ref(path+'/'+key+'/items').push({ desc: itm, amount: p, date: getFullDate() });
            document.getElementById(iid).value=''; document.getElementById(pid).value='';
        }
    }

    function addInc() {
        const w = document.getElementById('i-who').value, t = document.getElementById('i-type').value, a = parseInt(document.getElementById('i-amt').value);
        if(a) { db.ref('monthly_income').push({ who:w, type:t, amount:a, date:getFullDate() }); document.getElementById('i-amt').value=''; }
    }

    function addS() {
        const n = document.getElementById('s-item').value, q = parseInt(document.getElementById('s-qty').value);
        if(n && q) { db.ref('stock').push({ name:n, qty:q, date:getFullDate() }); document.getElementById('s-item').value=''; document.getElementById('s-qty').value=''; }
    }

    function addMyD() {
        const n = document.getElementById('my-name').value, note = document.getElementById('my-note').value, amt = parseInt(document.getElementById('my-amt').value), file = document.getElementById('my-img').files[0];
        if(n && amt) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const key = btoa(unescape(encodeURIComponent(n))).replace(/=/g, "");
                db.ref('my_debts/'+key).child('name').set(n);
                db.ref('my_debts/'+key+'/items').push({ desc:note, amount:amt, date:getFullDate(), img: file ? e.target.result : "" });
            };
            if(file) reader.readAsDataURL(file); else reader.onload();
        }
    }

    // دوال التحميل والربط (الخانات الفارغة انحلت هنا)
    function loadData() {
        render('records', 'list-debt', 'var(--green)');
        render('mobile_data', 'list-mobile', 'var(--blue)');
        render('my_debts', 'list-mydebts', '#e67e22');

        db.ref('monthly_income').on('value', s => {
            let h = '', net = 0; s.forEach(snap => {
                const d = snap.val(); net += (d.type==='وارد' ? d.amount : -d.amount);
                h = `<div class="card" style="border-right-color:${d.type==='وارد'?'green':'red'}">
                    <b>${d.who}:</b> ${d.type} بمبلغ <b>${d.amount.toLocaleString()}</b><br><small>${d.date}</small>
                    <div class="btn-row"><button onclick="editInc('${snap.key}',${d.amount})" class="btn-op" style="background:var(--blue)">✏️ تعديل</button>
                    <button onclick="db.ref('monthly_income/${snap.key}').remove()" class="btn-op" style="background:var(--red)">🗑 حذف</button></div></div>` + h;
            });
            document.getElementById('net').innerText = net.toLocaleString(); document.getElementById('list-income').innerHTML = h;
        });

        db.ref('stock').on('value', s => {
            let h = ''; s.forEach(snap => {
                const d = snap.val(); const isLow = d.qty <= 5 ? 'low-stock' : '';
                h += `<tr class="${isLow}"><td>${d.name}</td><td>${d.qty}</td>
                <td><button class="qty-btn" style="background:var(--green);color:white" onclick="updStk('${snap.key}',${d.qty},1)">+</button>
                <button class="qty-btn" style="background:var(--red);color:white" onclick="updStk('${snap.key}',${d.qty},-1)">-</button>
                <button onclick="db.ref('stock/${snap.key}').remove()" style="border:none;background:none;color:red">🗑</button></td></tr>`;
            });
            document.getElementById('list-stock').innerHTML = h;
        });
    }

    function render(path, target, color) {
        db.ref(path).on('value', s => {
            let h = ''; s.forEach(snap => {
                const d = snap.val(); let sum = 0, rows = '';
                if(d.items) Object.entries(d.items).forEach(([ik, i]) => {
                    sum += i.amount; rows += `<tr><td>${i.desc}</td><td>${i.amount.toLocaleString()}</td>
                    <td><button onclick="editItem('${path}','${snap.key}','${ik}','${i.desc}',${i.amount})" style="border:none;background:none">✏️</button></td></tr>
                    ${i.img?`<tr><td colspan="3"><img src="${i.img}" style="width:100%;border-radius:8px"></td></tr>`:''}
                    <tr><td colspan="3" style="font-size:9px;color:gray">${i.date}</td></tr>`;
                });
                h += `<div class="card print-area" style="border-right-color:${color}"><b>👤 ${d.name}</b><table>${rows}</table>
                    <div class="total-box">المجموع: ${sum.toLocaleString()}</div>
                    <div class="btn-row"><button onclick="plus('${snap.key}','${path}')" class="btn-op" style="background:var(--blue)">+ مادة</button>
                    <button onclick="pay('${snap.key}','${path}')" class="btn-op" style="background:var(--green)">تسديد</button>
                    <button onclick="window.print()" class="btn-op" style="background:var(--black)">🖨 طباعة</button>
                    <button onclick="db.ref('${path}/${snap.key}').remove()" class="btn-op" style="background:var(--red)">🗑 حذف</button></div></div>`;
            });
            document.getElementById(target).innerHTML = h;
        });
    }

    // دوال التعديل والتحديث
    function updStk(k, q, c) { const n = q+c; if(n<0) return; db.ref('stock/'+k).update({qty:n, date:getFullDate()}); if(n<=5 && c<0) alert("⚠️ المادة قربت تخلص!"); }
    function editItem(p, k, ik, oD, oA) { const nD = prompt("تعديل الاسم:", oD), nA = prompt("تعديل المبلغ:", oA); if(nD && nA) db.ref(p+'/'+k+'/items/'+ik).update({ desc:nD, amount:parseInt(nA) }); }
    function editInc(k, oA) { const nA = prompt("تعديل المبلغ:", oA); if(nA) db.ref('monthly_income/'+k).update({ amount:parseInt(nA) }); }
    function plus(k, p) { const m = prompt("المادة:"), a = prompt("المبلغ:"); if(m && a) db.ref(p+'/'+k+'/items').push({ desc:m, amount:parseInt(a), date:getFullDate() }); }
    function pay(k, p) { const a = prompt("المبلغ المسدد:"); if(a) db.ref(p+'/'+k+'/items').push({ desc: "واصل (تسديد)", amount: -parseInt(a), date: getFullDate() }); }
</script>
</body>
</html>

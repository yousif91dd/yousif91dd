<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة يوسف - نظام الديون والطباعة</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-add { background: var(--accent); }
        .debt-item { border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 10px; background: #fff; position: relative; }
        .debt-info { margin-bottom: 10px; }
        .debt-name { font-weight: bold; font-size: 18px; color: var(--primary); }
        .debt-amount { color: var(--danger); font-weight: bold; margin-right: 10px; }
        .actions { display: flex; gap: 5px; }
        .btn-print { background: #3498db; flex: 1; padding: 5px; font-size: 14px; }
        .btn-delete { background: var(--danger); width: 60px; padding: 5px; font-size: 14px; }
        .total-box { background: var(--primary); color: white; text-align: center; padding: 15px; border-radius: 10px; font-size: 20px; margin-top: 20px; }
        
        /* تصميم الوصل للطباعة فقط */
        @media print {
            body * { visibility: hidden; }
            .print-section, .print-section * { visibility: visible; }
            .print-section { position: absolute; left: 0; top: 0; width: 100%; text-align: center; padding: 20px; border: 1px solid #000; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

<div id="loginPage" class="container">
    <h2>🔐 دخول المكتبة</h2>
    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
</div>

<div id="mainPage" class="container" style="display:none;">
    <h2>📚 إدارة ديون المكتبة</h2>
    <input type="text" id="customerName" placeholder="اسم الزبون">
    <input type="number" id="amount" placeholder="المبلغ بالدينار">
    <button class="btn-add" onclick="saveDebt()">إضافة وحفظ +</button>
    <hr>
    <input type="text" id="search" placeholder="بحث عن اسم..." oninput="loadData()">
    <div id="list"></div>
    <div class="total-box">المجموع: <span id="total">0</span> دينار</div>
    <button style="background:gray;" onclick="location.reload()">تسجيل خروج</button>
</div>

<div id="printArea" class="print-section" style="display:none;"></div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "ضع_هنا",
        authDomain: "ضع_هنا",
        databaseURL: "ضع_هنا",
        projectId: "ضع_هنا",
        storageBucket: "ضع_هنا",
        messagingSenderId: "ضع_هنا",
        appId: "ضع_هنا"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function login() {
        if(document.getElementById('user').value === 'yousif' && document.getElementById('pass').value === '1991') {
            document.getElementById('loginPage').style.display='none';
            document.getElementById('mainPage').style.display='block';
            loadData();
        } else { alert("بيانات خطأ!"); }
    }

    function saveDebt() {
        const name = document.getElementById('customerName').value;
        const price = document.getElementById('amount').value;
        if(name && price) {
            db.ref('debts').push({
                name: name,
                amount: parseInt(price),
                date: new Date().toLocaleString('ar-EG')
            });
            document.getElementById('customerName').value='';
            document.getElementById('amount').value='';
        }
    }

    function loadData() {
        const searchVal = document.getElementById('search').value.toLowerCase();
        db.ref('debts').on('value', (snap) => {
            let html = ''; let sum = 0;
            snap.forEach((child) => {
                const d = child.val();
                if(d.name.toLowerCase().includes(searchVal)) {
                    sum += d.amount;
                    html += `
                    <div class="debt-item">
                        <div class="debt-info">
                            <div class="debt-name">${d.name}</div>
                            <div class="debt-amount">${d.amount.toLocaleString()} د.ع</div>
                            <small>${d.date}</small>
                        </div>
                        <div class="actions">
                            <button class="btn-print" onclick="printReceipt('${d.name}', '${d.amount}', '${d.date}')">🖨️ طباعة وصل</button>
                            <button class="btn-delete" onclick="deleteItem('${child.key}')">حذف</button>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('list').innerHTML = html;
            document.getElementById('total').innerText = sum.toLocaleString();
        });
    }

    function deleteItem(id) {
        if(confirm("حذف هذا الدين نهائياً؟")) db.ref('debts/'+id).remove();
    }

    function printReceipt(name, amount, date) {
        const printArea = document.getElementById('printArea');
        printArea.innerHTML = `
            <h3>مكتبة يوسف</h3>
            <p>-------------------------</p>
            <h4>وصل دين</h4>
            <p>الاسم: <b>${name}</b></p>
            <p>المبلغ: <b>${parseInt(amount).toLocaleString()} دينار</b></p>
            <p>التاريخ: ${date}</p>
            <p>-------------------------</p>
            <p>شكراً لتعاملكم معنا</p>
        `;
        window.print();
    }
</script>
</body>
</html>

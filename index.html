<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مكتبة يوسف الشامل</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 15px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h2 { color: #1a252f; margin-bottom: 25px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        .btn-add { background: #27ae60; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; width: 90%; cursor: pointer; margin-top: 10px; }
        .debt-item { background: #fff; border: 1px solid #eee; padding: 15px; margin-top: 15px; border-radius: 12px; text-align: right; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .debt-name { font-weight: bold; font-size: 18px; color: #2c3e50; display: block; }
        .debt-amount { color: #e74c3c; font-weight: bold; font-size: 16px; }
        .actions { margin-top: 10px; display: flex; gap: 10px; }
        .btn-print { background: #3498db; color: white; border: none; padding: 8px; border-radius: 5px; flex: 2; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 8px; border-radius: 5px; flex: 1; }
        .total-box { background: #1a252f; color: white; padding: 15px; border-radius: 12px; margin-top: 20px; font-size: 20px; }
        @media print { body * { visibility: hidden; } .print-area, .print-area * { visibility: visible; } .print-area { position: absolute; left: 0; top: 0; width: 100%; border: 2px solid #000; padding: 20px; } }
    </style>
</head>
<body>

<div id="loginSection" class="card">
    <h2>🔐 دخول النظام</h2>
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button class="btn-add" onclick="checkPass()">دخول</button>
</div>

<div id="appSection" class="card" style="display:none;">
    <h2>📚 مكتبة يوسف</h2>
    <input type="text" id="cust" placeholder="اسم الزبون">
    <input type="number" id="amt" placeholder="المبلغ">
    <button class="btn-add" onclick="add()">حفظ الدين +</button>
    <hr>
    <div id="list"></div>
    <div class="total-box">المجموع: <span id="total">0</span> د.ع</div>
</div>

<div id="printArea" class="print-area" style="display:none;"></div>

<script>
    // ضع هنا معلومات Firebase مالتك
    const firebaseConfig = { apiKey: "AIza...", databaseURL: "https://..." }; // استبدلها بالقيم الصحيحة
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkPass() {
        if(document.getElementById('pass').value === '1991') {
            document.getElementById('loginSection').style.display='none';
            document.getElementById('appSection').style.display='block';
            show();
        } else { alert("خطأ!"); }
    }

    function add() {
        const n = document.getElementById('cust').value;
        const a = document.getElementById('amt').value;
        if(n && a) {
            db.ref('debts').push({ name: n, amount: parseInt(a), date: new Date().toLocaleString() });
            document.getElementById('cust').value=''; document.getElementById('amt').value='';
        }
    }

    function show() {
        db.ref('debts').on('value', (s) => {
            let h = ''; let t = 0;
            s.forEach((c) => {
                const d = c.val(); t += d.amount;
                h += `<div class="debt-item">
                    <span class="debt-name">${d.name}</span>
                    <span class="debt-amount">${d.amount.toLocaleString()} د.ع</span>
                    <div class="actions">
                        <button class="btn-print" onclick="prnt('${d.name}','${d.amount}')">🖨️ طباعة</button>
                        <button class="btn-del" onclick="del('${c.key}')">حذف</button>
                    </div>
                </div>`;
            });
            document.getElementById('list').innerHTML = h;
            document.getElementById('total').innerText = t.toLocaleString();
        });
    }

    function del(id) { if(confirm("حذف؟")) db.ref('debts/'+id).remove(); }

    function prnt(n, a) {
        const p = document.getElementById('printArea');
        p.innerHTML = `<h2>وصل مكتبة يوسف</h2><hr><p>الزبون: ${n}</p><p>المبلغ: ${a} د.ع</p><p>التاريخ: ${new Date().toLocaleDateString()}</p>`;
        window.print();
    }
</script>
</body>
</html>

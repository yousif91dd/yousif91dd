<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام سجلات مكتبة يوسف</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --main: #2c3e50; --green: #27ae60; --red: #e74c3c; --blue: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .login-box, .container { max-width: 600px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--main); }
        h2, h3 { text-align: center; color: var(--main); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .btn-add { background: var(--green); color: white; }
        .btn-back { background: #7f8c8d; color: white; margin-bottom: 10px; }
        .card { background: #fff; border: 1px solid #eee; padding: 15px; margin-top: 10px; border-radius: 12px; cursor: pointer; transition: 0.2s; position: relative; }
        .card:hover { background: #f9f9f9; }
        .debt-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; font-size: 14px; }
        .total-box { background: var(--main); color: white; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: center; font-size: 20px; }
        .badge { background: var(--red); color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; }
        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; top: 0; width: 100%; } }
    </style>
</head>
<body>

<div id="login-screen" class="login-box">
    <h2>🔐 دخول نظام السجلات</h2>
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button class="btn-add" onclick="login()">دخول</button>
</div>

<div id="main-app" class="container" style="display:none;">
    <h2>👥 سجل زبائن مكتبة يوسف</h2>
    <input type="text" id="searchName" placeholder="بحث عن زبون أو إضافة جديد..." oninput="filterCustomers()">
    <button class="btn-add" onclick="addNewCustomer()">+ إضافة ملف زبون جديد</button>
    <div id="customer-list"></div>
    <div class="total-box">إجمالي الديون المعلقة: <span id="grandTotal">0</span> د.ع</div>
</div>

<div id="customer-details" class="container" style="display:none;">
    <button class="btn-back" onclick="showMain()">⬅ رجوع للقائمة</button>
    <h3 id="curName">اسم الزبون</h3>
    <div style="background: #ebf5fb; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
        <h4>➕ إضافة دين جديد لهذا السجل</h4>
        <input type="text" id="itemType" placeholder="نوع المادة...">
        <div class="grid-inputs">
            <input type="number" id="itemQty" placeholder="العدد" oninput="calcTotal()">
            <input type="number" id="itemPrice" placeholder="السعر" oninput="calcTotal()">
        </div>
        <input type="number" id="finalPrice" placeholder="الإجمالي" readonly>
        <button class="btn-add" onclick="addInvoice()">حفظ الوصل في السجل</button>
    </div>
    
    <h4>📜 سجل الديون والتسديدات</h4>
    <div id="invoice-list"></div>
    <button style="background:var(--red); color:white;" onclick="deleteEntireCustomer()">🗑 حذف سجل الزبون نهائياً</button>
</div>

<div id="print-area" style="display:none;"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAwa3TBmBMmuuIxD0R_EVQTLASWivqjIx8",
        authDomain: "maktb-yousif.firebaseapp.com",
        databaseURL: "https://maktb-yousif-default-rtdb.firebaseio.com",
        projectId: "maktb-yousif",
        storageBucket: "maktb-yousif.firebasestorage.app",
        messagingSenderId: "200688688416",
        appId: "1:200688688416:web:1354d536d74fd0accb0b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentCustomerId = null;

    function login() {
        if(document.getElementById('pass').value === "1991") {
            document.getElementById('login-screen').style.display='none';
            document.getElementById('main-app').style.display='block';
        } else { alert("خطأ!"); }
    }

    function showMain() {
        document.getElementById('main-app').style.display='block';
        document.getElementById('customer-details').style.display='none';
        currentCustomerId = null;
    }

    function addNewCustomer() {
        const name = document.getElementById('searchName').value;
        if(name) {
            db.ref('customers').push({ name: name, totalDebt: 0 });
            document.getElementById('searchName').value = '';
        } else { alert("اكتب الاسم الثلاثي أولاً في خانة البحث"); }
    }

    function calcTotal() {
        document.getElementById('finalPrice').value = (document.getElementById('itemQty').value || 0) * (document.getElementById('itemPrice').value || 0);
    }

    // عرض قائمة الزبائن
    db.ref('customers').on('value', (s) => {
        let h = ''; let gt = 0;
        s.forEach((child) => {
            const d = child.val();
            gt += (d.totalDebt || 0);
            h += `<div class="card" onclick="openCustomer('${child.key}', '${d.name}')">
                    <b>👤 ${d.name}</b>
                    <div style="color:red; font-weight:bold;">المطلوب: ${(d.totalDebt || 0).toLocaleString()} د.ع</div>
                  </div>`;
        });
        document.getElementById('customer-list').innerHTML = h;
        document.getElementById('grandTotal').innerText = gt.toLocaleString();
    });

    function openCustomer(id, name) {
        currentCustomerId = id;
        document.getElementById('curName').innerText = name;
        document.getElementById('main-app').style.display='none';
        document.getElementById('customer-details').style.display='block';
        loadInvoices(id);
    }

    function addInvoice() {
        const type = document.getElementById('itemType').value;
        const total = parseInt(document.getElementById('finalPrice').value);
        if(total > 0) {
            const invRef = db.ref('customers/' + currentCustomerId + '/invoices').push();
            invRef.set({ type: type, amount: total, date: new Date().toLocaleDateString('ar-IQ') });
            
            // تحديث إجمالي دين الزبون
            db.ref('customers/' + currentCustomerId + '/totalDebt').transaction(current => (current || 0) + total);
            ["itemType","itemQty","itemPrice","finalPrice"].forEach(i => document.getElementById(i).value='');
        }
    }

    function loadInvoices(id) {
        db.ref('customers/' + id + '/invoices').on('value', (s) => {
            let h = '';
            s.forEach((child) => {
                const d = child.val();
                h += `<div class="debt-row">
                        <span>📅 ${d.date} - ${d.type}</span>
                        <b>${d.amount.toLocaleString()} د.ع</b>
                        <button style="width:50px; background:var(--red); color:white; padding:2px;" onclick="deleteInvoice('${child.key}', ${d.amount})">X</button>
                      </div>`;
            });
            document.getElementById('invoice-list').innerHTML = h || '<p>لا توجد ديون مسجلة</p>';
        });
    }

    function deleteInvoice(invId, amount) {
        if(confirm("حذف هذا الوصل؟")) {
            db.ref('customers/' + currentCustomerId + '/invoices/' + invId).remove();
            db.ref('customers/' + currentCustomerId + '/totalDebt').transaction(current => (current || 0) - amount);
        }
    }

    function deleteEntireCustomer() {
        if(confirm("حذف ملف الزبون وكل ديونه نهائياً؟")) {
            db.ref('customers/' + currentCustomerId).remove();
            showMain();
        }
    }
</script>
</body>
</html>

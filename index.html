<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة مكتبة يوسف الشامل</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --main: #2c3e50; --green: #27ae60; --red: #e74c3c; --blue: #3498db; --orange: #f39c12; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* شاشة الدخول */
        #login-screen { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border-top: 10px solid var(--main); }
        
        /* القائمة العلوية للتنقل */
        .navbar { display: none; background: var(--main); padding: 10px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-around; }
        .nav-btn { color: white; border: none; background: none; font-weight: bold; padding: 10px; cursor: pointer; font-size: 16px; }
        .nav-btn.active { border-bottom: 3px solid var(--blue); color: var(--blue); }

        .container { max-width: 550px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { border-radius: 8px; cursor: pointer; font-weight: bold; border: none; transition: 0.3s; }
        
        /* كروت الديون والمخزن */
        .card { background: #fff; border: 1px solid #eee; padding: 15px; margin-top: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .debt-card { border-right: 6px solid var(--blue); }
        .stock-card { border-right: 6px solid var(--green); }
        
        .item-row { background: #f9f9f9; padding: 8px; margin: 5px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .total-box { background: var(--main); color: white; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; margin-top: 10px; }
        
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .bg-red { background: #ffebee; color: var(--red); }
        .bg-orange { background: #fff3e0; color: var(--orange); }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-sm { padding: 8px; font-size: 12px; color: white; }

        @media print { body * { visibility: hidden; } #print-area, #print-area * { visibility: visible; } #print-area { position: absolute; top: 0; width: 100%; } }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>📚 نظام يوسف الشامل</h2>
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button style="background: var(--main); color:white; width:100%; padding:12px;" onclick="checkLogin()">دخول النظام</button>
</div>

<div id="nav" class="navbar" style="display: none;">
    <button class="nav-btn active" id="btn-debt" onclick="showTab('debt')">👥 الديون</button>
    <button class="nav-btn" id="btn-stock" onclick="showTab('stock')">📦 المخزن</button>
    <button class="nav-btn" onclick="location.reload()" style="color: var(--red);">❌ خروج</button>
</div>

<div class="container" id="tab-debt">
    <h3>🔍 بحث عن زبون</h3>
    <input type="text" id="searchDebt" placeholder="ابحث بالاسم..." oninput="filterRows('debt')">
    <div style="background: #f0f7ff; padding: 10px; border-radius: 10px; margin-bottom: 10px;">
        <input type="text" id="newCust" placeholder="اسم زبون جديد...">
        <button style="background: var(--blue); color:white; width:100%; padding:10px;" onclick="addCustomer()">فتح سجل جديد +</button>
    </div>
    <div id="debt-list"></div>
</div>

<div class="container" id="tab-stock">
    <h3>🔍 بحث في المخزن</h3>
    <input type="text" id="searchStock" placeholder="ابحث عن مادة..." oninput="filterRows('stock')">
    <div style="background: #f0fff4; padding: 10px; border-radius: 10px; margin-bottom: 10px;">
        <input type="text" id="newMat" placeholder="اسم المادة الجديدة...">
        <input type="number" id="newQty" placeholder="الكمية...">
        <button style="background: var(--green); color:white; width:100%; padding:10px;" onclick="addMaterial()">إضافة للمخزن +</button>
    </div>
    <div id="stock-list"></div>
</div>

<div id="print-area" style="display:none;"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAwa3TBmBMmuuIxD0R_EVQTLASWivqjIx8",
        authDomain: "maktb-yousif.firebaseapp.com",
        databaseURL: "https://maktb-yousif-default-rtdb.firebaseio.com",
        projectId: "maktb-yousif",
        storageBucket: "maktb-yousif.firebasestorage.app",
        messagingSenderId: "200688688416",
        appId: "1:200688688416:web:1354d536d74fd0accb0b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkLogin() {
        if(document.getElementById('pass').value === "1991") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('nav').style.display = 'flex';
            showTab('debt');
            loadAllData();
        } else { alert("خطأ!"); }
    }

    function showTab(tab) {
        document.getElementById('tab-debt').style.display = (tab === 'debt' ? 'block' : 'none');
        document.getElementById('tab-stock').style.display = (tab === 'stock' ? 'block' : 'none');
        document.getElementById('btn-debt').classList.toggle('active', tab === 'debt');
        document.getElementById('btn-stock').classList.toggle('active', tab === 'stock');
    }

    // --- وظائف الديون ---
    function addCustomer() {
        const name = document.getElementById('newCust').value.trim();
        if(name) {
            const key = btoa(unescape(encodeURIComponent(name))).replace(/=/g, ""); 
            db.ref('records/' + key).child('name').set(name);
            document.getElementById('newCust').value = '';
        }
    }

    function addDebtItem(key) {
        const type = prompt("نوع المادة:");
        const price = prompt("السعر:");
        if(type && price) {
            db.ref('records/'+key+'/items').push({ type: type, amount: parseInt(price), date: new Date().toLocaleDateString('ar-IQ') });
        }
    }

    function payDebt(key) {
        const amount = prompt("المبلغ المسدد:");
        if(amount) {
            db.ref('records/'+key+'/items').push({ type: "تسديد نقد", amount: -parseInt(amount), date: new Date().toLocaleDateString('ar-IQ') });
        }
    }

    // --- وظائف المخزن ---
    function addMaterial() {
        const name = document.getElementById('newMat').value.trim();
        const qty = parseInt(document.getElementById('newQty').value) || 0;
        if(name) {
            db.ref('inventory').push({ name: name, qty: qty });
            document.getElementById('newMat').value = '';
            document.getElementById('newQty').value = '';
        }
    }

    function updateStock(id, current, change) {
        if(current + change >= 0) db.ref('inventory/' + id).update({ qty: current + change });
    }

    // --- تحميل البيانات ---
    function loadAllData() {
        // تحميل الديون
        db.ref('records').on('value', s => {
            let h = '';
            s.forEach(snap => {
                const d = snap.val(); let sum = 0; let items = '';
                if(d.items) Object.keys(d.items).forEach(k => {
                    const i = d.items[k]; sum += i.amount;
                    items += `<div class="item-row"><span>${i.type}</span><b>${i.amount.toLocaleString()}</b></div>`;
                });
                h += `<div class="card debt-card" data-search="${d.name}">
                    <b>👤 ${d.name}</b>
                    <div>${items}</div>
                    <div class="total-box">المجموع: ${sum.toLocaleString()} د.ع</div>
                    <div class="action-grid">
                        <button class="btn-sm" style="background:var(--blue)" onclick="addDebtItem('${snap.key}')">+ دين</button>
                        <button class="btn-sm" style="background:var(--green)" onclick="payDebt('${snap.key}')">📉 تسديد</button>
                    </div>
                </div>`;
            });
            document.getElementById('debt-list').innerHTML = h;
        });

        // تحميل المخزن
        db.ref('inventory').on('value', s => {
            let h = '';
            s.forEach(snap => {
                const d = snap.val();
                let status = d.qty <= 0 ? '<span class="badge bg-red">خلص!</span>' : (d.qty <= 5 ? '<span class="badge bg-orange">قرب يخلص</span>' : '');
                h += `<div class="card stock-card" data-search="${d.name}">
                    <div style="display:flex; justify-content:space-between;"><b>📦 ${d.name}</b> ${status}</div>
                    <div style="text-align:center; font-size:20px; margin:10px 0;">الكمية: <b>${d.qty}</b></div>
                    <div class="action-grid">
                        <button class="btn-sm" style="background:var(--green)" onclick="updateStock('${snap.key}', ${d.qty}, 1)">+ شراء</button>
                        <button class="btn-sm" style="background:var(--main)" onclick="updateStock('${snap.key}', ${d.qty}, -1)">- بيع</button>
                    </div>
                </div>`;
            });
            document.getElementById('stock-list').innerHTML = h;
        });
    }

    function filterRows(type) {
        const txt = document.getElementById(type === 'debt' ? 'searchDebt' : 'searchStock').value.toLowerCase();
        const cards = document.querySelectorAll(type === 'debt' ? '.debt-card' : '.stock-card');
        cards.forEach(c => c.style.display = c.getAttribute('data-search').toLowerCase().includes(txt) ? 'block' : 'none');
    }
</script>
</body>
</html>
